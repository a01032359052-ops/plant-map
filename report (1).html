<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>식물 제보하기</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  :root{
    --forest:#1F3D2B;
    --moss:#4A7C59;
    --paper:#F2ECDE;
    --coral:#C97B63;
    --ink:#2B2620;
    --gold:#D4A94A;
    --line:#D8CDB4;
    --card:#FBF8F0;
    --danger:#B4543E;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Work Sans', sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding-bottom:40px;
  }
  header{
    display:flex; align-items:center; gap:12px;
    padding:16px 20px;
    background:var(--forest);
  }
  header a{ color:var(--paper); text-decoration:none; font-size:20px; }
  header h1{
    font-family:'Fraunces', serif; font-weight:600; font-size:18px; color:var(--paper);
  }

  .wrap{ max-width:480px; margin:0 auto; padding:20px 18px; }

  .field{ margin-bottom:22px; }
  .field label{
    display:flex; align-items:center; gap:6px;
    font-weight:600; font-size:14px; color:var(--forest); margin-bottom:8px;
  }
  .field .optional{ font-weight:400; color:#9A9078; font-size:12px; }

  /* ---------- 위치 선택 (Leaflet) ---------- */
  #pickMap{
    width:100%; height:220px; border-radius:12px; overflow:hidden;
    border:1px solid var(--line); background:#E4DEC9;
  }
  .loc-hint{ font-size:12px; color:#7A7360; margin-top:6px; }
  .gps-btn{
    margin-top:8px;
    display:inline-flex; align-items:center; gap:6px;
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:8px 14px; font-size:13px; font-weight:500; color:var(--forest); cursor:pointer;
    touch-action:manipulation;
    width:100%; justify-content:center;
  }
  .gps-btn svg{ width:15px; height:15px; }
  .geo-note{
    margin-top:8px;
    padding:10px 12px;
    background:rgba(201,123,99,.12);
    border:1px solid rgba(201,123,99,.25);
    border-radius:10px;
    color:#7A4A36;
    font-size:12px;
    line-height:1.5;
    display:none;
  }

  /* ---------- 사진 업로드 ---------- */
  .photo-upload{
    border:1.5px dashed var(--moss); border-radius:12px;
    background:var(--card);
    padding:20px; text-align:center; cursor:pointer;
    position:relative;
  }
  .photo-upload svg{ width:26px; height:26px; color:var(--moss); margin-bottom:6px; }
  .photo-upload p{ font-size:13px; color:#6B6450; }
  .photo-upload input[type=file]{
    position:absolute; inset:0; opacity:0; cursor:pointer;
  }
  #photoPreview{
    margin-top:10px; width:100%; max-height:220px; object-fit:cover;
    border-radius:12px; display:none;
  }

  /* ---------- 텍스트 입력 ---------- */
  input[type=text], textarea{
    width:100%; padding:12px 14px;
    border:1px solid var(--line); border-radius:10px;
    background:var(--card);
    font-family:'Work Sans', sans-serif; font-size:16px; color:var(--ink);
    outline:none;
  }
  input[type=text]:focus, textarea:focus{ border-color:var(--moss); }
  textarea{ resize:vertical; min-height:70px; }

  /* ---------- 제출 버튼 ---------- */
  .submit-btn{
    width:100%; padding:15px; border:none; border-radius:14px;
    background:var(--coral); color:#fff;
    font-family:'Work Sans', sans-serif; font-weight:700; font-size:15px;
    cursor:pointer; margin-top:10px;
    box-shadow:0 8px 20px rgba(201,123,99,.35);
    touch-action:manipulation;
  }
  .submit-btn:disabled{ opacity:.5; cursor:not-allowed; box-shadow:none; }

  .error-msg{
    font-size:12px; color:var(--danger); margin-top:6px; display:none;
  }

  /* ---------- 완료 화면 ---------- */
  #successScreen{
    display:none;
    max-width:480px; margin:60px auto; padding:0 20px; text-align:center;
  }
  #successScreen .icon{ font-size:44px; margin-bottom:14px; }
  #successScreen h2{ font-family:'Fraunces', serif; font-size:22px; color:var(--forest); margin-bottom:8px; }
  #successScreen p{ font-size:14px; color:#6B6450; margin-bottom:24px; line-height:1.5; }
  #successScreen a{
    display:inline-block; padding:12px 22px; border-radius:12px;
    background:var(--forest); color:var(--paper); text-decoration:none; font-weight:600; font-size:14px;
  }

  @media (max-width:480px){
    body{padding-bottom:calc(24px + env(safe-area-inset-bottom));}
    header{padding:14px 16px;}
    .wrap{padding:16px 14px 32px;}
    .field{margin-bottom:18px;}
    .photo-upload{padding:16px;}
    .submit-btn{padding:16px; font-size:16px;}
    #pickMap{height:min(60vh, 260px);}
  }
</style>
</head>
<body>

<header>
  <a href="index.html" aria-label="뒤로가기">&larr;</a>
  <h1>🌱 식물 제보하기</h1>
</header>

<div class="wrap" id="formWrap">

  <div class="field">
    <label>📍 위치 <span class="optional">(지도를 클릭하거나 GPS 버튼을 눌러주세요)</span></label>
    <div id="pickMap"></div>
    <div class="loc-hint" id="locHint">아직 위치를 선택하지 않았어요</div>
    <div class="gps-btn" id="gpsBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      현재 위치 사용
    </div>
    <div class="geo-note" id="geoNote">위치 권한은 HTTPS 주소나 브라우저 설정에서 허용해야 작동합니다.</div>
  </div>

  <div class="field">
    <label>📸 사진</label>
    <div class="photo-upload" id="photoUploadBox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h3l2-3h6l2 3h3v13H4z"/><circle cx="12" cy="13" r="3.5"/></svg>
      <p>탭해서 사진 선택 (촬영 또는 앨범)</p>
      <input type="file" id="photoInput" accept="image/*" capture="environment" />
    </div>
    <img id="photoPreview" alt="선택한 사진 미리보기" />
  </div>

  <div class="field">
    <label>✏️ 닉네임 <span class="optional">(선택, 비워두면 "익명"으로 저장돼요)</span></label>
    <input type="text" id="nicknameInput" maxlength="10" placeholder="예: 산책러버" />
  </div>

  <div class="field">
    <label>💬 메모 <span class="optional">(선택)</span></label>
    <textarea id="memoInput" maxlength="100" placeholder="예: 공원 산책로 입구, 4월 초 개화"></textarea>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <button class="submit-btn" id="submitBtn">제보하기</button>
</div>

<div id="successScreen">
  <div class="icon">🌿</div>
  <h2>제보 완료!</h2>
  <p id="successText">지금까지 이 기기로 <b id="reportCount">1</b>건 제보하셨어요.<br>관리자 검수 후 지도에 등록돼요.</p>
  <a href="index.html">지도로 돌아가기</a>
</div>

<!-- ============================================================
  Leaflet(지도) + Supabase(데이터/사진 저장) SDK
  index.html의 CONFIG와 반드시 같은 Supabase 값을 넣어주세요.
============================================================= -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const CONFIG = {
  SUPABASE_URL: "https://tdyhuausauyqnclmzjin.supabase.co/rest/v1/",
  SUPABASE_ANON_KEY: "sb_publishable_ly243x1R040NH714t21Gew_kvcBc1SH",
  DEFAULT_CENTER: { lat: 37.5665, lng: 126.9780 },
  DEFAULT_LEVEL: 13
};

const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

let map, marker;
let selectedLat = null, selectedLng = null;
let selectedFile = null;

/* ---------- device_id: 이 브라우저만의 고유 식별값을 만들어 localStorage에 저장 ---------- */
function getDeviceId(){
  let id = localStorage.getItem('plant_device_id');
  if(!id){
    id = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('plant_device_id', id);
  }
  return id;
}

/* ---------- 지도 초기화 (Leaflet) ---------- */
function initMap(){
  const container = document.getElementById('pickMap');
  map = L.map(container).setView([CONFIG.DEFAULT_CENTER.lat, CONFIG.DEFAULT_CENTER.lng], CONFIG.DEFAULT_LEVEL);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  setTimeout(() => map.invalidateSize(), 0);

  map.on('click', (e) => {
    setLocation(e.latlng.lat, e.latlng.lng);
  });
}

function setLocation(lat, lng){
  selectedLat = lat; selectedLng = lng;
  if(marker){ map.removeLayer(marker); }
  marker = L.marker([lat, lng]).addTo(map);
  map.panTo([lat, lng]);
  document.getElementById('locHint').textContent =
    `선택된 위치: 위도 ${lat.toFixed(5)}, 경도 ${lng.toFixed(5)}`;
}

document.getElementById('gpsBtn').addEventListener('click', () => {
  const note = document.getElementById('geoNote');
  const onError = (err) => {
    const detail = err && err.code === 1 ? '사용자가 권한을 거부했습니다' : err && err.code === 2 ? '위치 정보를 찾을 수 없습니다' : err && err.code === 3 ? '위치 요청이 시간 초과됐습니다' : '위치 요청에 실패했습니다';
    note.textContent = `${detail}. 모바일에서는 브라우저 설정에서 위치 권한을 허용한 뒤 다시 눌러주세요.`;
    note.style.display = 'block';
  };

  if(!navigator.geolocation){
    note.textContent = '이 브라우저는 위치 기능을 지원하지 않습니다.';
    note.style.display = 'block';
    return;
  }
  if(location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1'){
    note.textContent = '모바일에서는 HTTPS 주소로 열었을 때 위치 권한이 더 안정적으로 작동합니다.';
    note.style.display = 'block';
    return;
  }
  note.textContent = '위치 권한을 확인하는 중입니다. 브라우저가 권한 요청을 표시하면 허용해 주세요.';
  note.style.display = 'block';
  navigator.geolocation.getCurrentPosition(pos => {
    note.textContent = '현재 위치로 지도를 이동했습니다.';
    setLocation(pos.coords.latitude, pos.coords.longitude);
  }, onError, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
});

/* ---------- 사진 미리보기 ---------- */
document.getElementById('photoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const preview = document.getElementById('photoPreview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

/* ---------- 닉네임 자동완성 (지난번 입력값 불러오기) ---------- */
window.addEventListener('DOMContentLoaded', () => {
  const savedNickname = localStorage.getItem('plant_nickname');
  if(savedNickname){ document.getElementById('nicknameInput').value = savedNickname; }
  initMap();
});

/* ---------- 제출 ---------- */
document.getElementById('submitBtn').addEventListener('click', async () => {
  const errorEl = document.getElementById('errorMsg');
  errorEl.style.display = 'none';

  if(selectedLat === null){
    showError('위치를 먼저 선택해주세요 (지도를 클릭하거나 GPS 버튼).');
    return;
  }
  if(!selectedFile){
    showError('사진을 선택해주세요.');
    return;
  }

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = '제보 중...';

  try{
    const deviceId = getDeviceId();
    let nickname = document.getElementById('nicknameInput').value.trim();
    if(!nickname){ nickname = '익명'; } else { localStorage.setItem('plant_nickname', nickname); }
    const memo = document.getElementById('memoInput').value.trim();

    // 1) 사진을 Supabase Storage에 업로드
    const fileExt = selectedFile.name.split('.').pop();
    const fileName = `${deviceId}_${Date.now()}.${fileExt}`;
    const { error: uploadError } = await supabaseClient
      .storage.from('plant-photos')
      .upload(fileName, selectedFile);

    if(uploadError) throw uploadError;

    const { data: urlData } = supabaseClient
      .storage.from('plant-photos')
      .getPublicUrl(fileName);
    const photoUrl = urlData.publicUrl;

    // 2) reports 테이블에 제보 정보 저장 (status는 자동으로 pending)
    const { error: insertError } = await supabaseClient
      .from('reports')
      .insert({
        lat: selectedLat,
        lng: selectedLng,
        photo_url: photoUrl,
        nickname: nickname,
        device_id: deviceId,
        description: memo
      });

    if(insertError) throw insertError;

    // 3) 이 기기의 누적 제보 수 세기 (재미 요소)
    const { count } = await supabaseClient
      .from('reports')
      .select('*', { count: 'exact', head: true })
      .eq('device_id', deviceId);

    showSuccess(nickname, count || 1);

  }catch(err){
    console.error(err);
    showError('제보에 실패했어요. 잠시 후 다시 시도해주세요. (오류: ' + err.message + ')');
    submitBtn.disabled = false;
    submitBtn.textContent = '제보하기';
  }
});

function showError(msg){
  const errorEl = document.getElementById('errorMsg');
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
}

function showSuccess(nickname, count){
  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('successScreen').style.display = 'block';
  document.getElementById('reportCount').textContent = count;
  document.getElementById('successText').innerHTML =
    `${escapeHtml(nickname)}님, 지금까지 이 기기로 <b>${count}</b>건 제보하셨어요.<br>관리자 검수 후 지도에 등록돼요.`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
</script>
</body>
</html>
