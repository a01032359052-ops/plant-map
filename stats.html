<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<title>통계 - 우리 지역 식물 지도</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --forest:#1F3D2B;
    --moss:#4A7C59;
    --paper:#F2ECDE;
    --coral:#C97B63;
    --ink:#2B2620;
    --gold:#D4A94A;
    --line:#D8CDB4;
    --card:#FBF8F0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    background:var(--paper);
    min-height:100vh;
  }
  header{
    display:flex; align-items:center; gap:12px;
    padding:16px 24px;
    background:var(--forest);
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  header a{ color:var(--paper); text-decoration:none; font-size:20px; }
  header h1{
    font-family:'Fraunces', serif; font-weight:600; font-size:18px; color:var(--paper);
  }

  main{ max-width:720px; margin:0 auto; padding:32px 20px 60px; }

  .summary-cards{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:12px;
    margin-bottom:28px;
  }
  .summary-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px 12px; text-align:center;
  }
  .summary-card .num{
    font-family:'Fraunces', serif; font-weight:700; font-size:26px; color:var(--forest);
    display:block;
  }
  .summary-card .label{ font-size:11px; color:#7A7360; margin-top:4px; }

  .section{ margin-bottom:32px; }
  .section h2{
    font-family:'Fraunces', serif; font-size:17px; color:var(--forest);
    margin-bottom:14px; display:flex; align-items:center; gap:6px;
  }

  .rank-list{ display:flex; flex-direction:column; gap:10px; max-height:480px; overflow-y:auto; padding-right:2px; }
  .rank-item{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; display:flex; align-items:center; gap:12px;
  }
  .rank-badge{
    width:28px; height:28px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces', serif; font-weight:700; font-size:13px;
    background:var(--paper); color:var(--forest); border:1px solid var(--line);
  }
  .rank-item:nth-child(1) .rank-badge{ background:var(--gold); color:#fff; border-color:var(--gold); }
  .rank-body{ flex:1; min-width:0; }
  .rank-name{ font-size:14px; font-weight:600; color:var(--ink); }
  .rank-bar-track{
    height:6px; background:var(--paper); border-radius:999px; margin-top:6px; overflow:hidden;
  }
  .rank-bar-fill{
    height:100%; background:var(--moss); border-radius:999px;
  }
  .rank-count{ font-size:13px; font-weight:700; color:var(--moss); flex-shrink:0; }

  .empty-state{
    text-align:center; padding:40px 20px; color:#8A8268; font-size:13px;
  }

  @media (max-width:480px){
    main{padding:20px 14px 40px;}
    .summary-card .num{ font-size:21px; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" aria-label="뒤로가기">&larr;</a>
  <h1>📊 우리 지역 식물 지도 통계</h1>
</header>

<main>
  <div class="summary-cards">
    <div class="summary-card">
      <span class="num" id="totalApproved">-</span>
      <span class="label">승인된 식물</span>
    </div>
    <div class="summary-card">
      <span class="num" id="monthlyNew">-</span>
      <span class="label">이번 달 신규 등록</span>
    </div>
    <div class="summary-card">
      <span class="num" id="totalReactions">-</span>
      <span class="label">누적 "도움이 되었어요"</span>
    </div>
  </div>

  <div class="section">
    <h2>🏆 최다 발견 식물 전체 순위</h2>
    <div class="rank-list" id="topPlants">
      <div class="empty-state">불러오는 중...</div>
    </div>
  </div>

  <div class="section">
    <h2>🌱 이달의 제보왕 전체 순위</h2>
    <div class="rank-list" id="topContributors">
      <div class="empty-state">불러오는 중...</div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CONFIG = {
  SUPABASE_URL: "https://tdyhuausauyqnclmzjin.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_ly243x1R040NH714t21Gew_kvcBc1SH"
};

const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

async function loadStats(){
  const { data: reports, error: reportsError } = await supabaseClient
    .from('reports')
    .select('*')
    .eq('status', 'approved');

  if(reportsError){
    document.getElementById('topPlants').innerHTML =
      `<div class="empty-state">데이터를 불러오지 못했어요.<br>오류: ${escapeHtml(reportsError.message)}</div>`;
    document.getElementById('topContributors').innerHTML = '';
    return;
  }

  const { data: reactions } = await supabaseClient
    .from('reactions')
    .select('id');

  renderSummary(reports || [], reactions || []);
  renderTopPlants(reports || []);
  renderTopContributors(reports || []);
}

function renderSummary(reports, reactions){
  document.getElementById('totalApproved').textContent = reports.length;

  const now = new Date();
  const monthlyCount = reports.filter(r => {
    if(!r.created_at) return false;
    const d = new Date(r.created_at);
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  }).length;
  document.getElementById('monthlyNew').textContent = monthlyCount;

  document.getElementById('totalReactions').textContent = reactions.length;
}

function renderTopPlants(reports){
  const area = document.getElementById('topPlants');
  const counts = {};
  reports.forEach(r => {
    const name = (r.plant_name || '').trim();
    if(!name) return;
    counts[name] = (counts[name] || 0) + 1;
  });
  const top = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  if(top.length === 0){
    area.innerHTML = '<div class="empty-state">아직 데이터가 없어요</div>';
    return;
  }
  const maxCount = top[0][1];
  area.innerHTML = top.map(([name, count], i) => `
    <div class="rank-item">
      <div class="rank-badge">${i + 1}</div>
      <div class="rank-body">
        <div class="rank-name">${escapeHtml(name)}</div>
        <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${(count / maxCount) * 100}%"></div></div>
      </div>
      <div class="rank-count">${count}건</div>
    </div>`).join('');
}

function renderTopContributors(reports){
  const area = document.getElementById('topContributors');
  const now = new Date();
  const monthly = reports.filter(r => {
    if(!r.created_at) return false;
    const d = new Date(r.created_at);
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  });

  const counts = {};
  monthly.forEach(r => {
    const key = r.device_id || r.nickname || 'unknown';
    if(!counts[key]){ counts[key] = { count: 0, nickname: r.nickname || '익명' }; }
    counts[key].count += 1;
    counts[key].nickname = r.nickname || counts[key].nickname; // 최신 닉네임으로 갱신
  });

  const top = Object.entries(counts).sort((a, b) => b[1].count - a[1].count);

  if(top.length === 0){
    area.innerHTML = '<div class="empty-state">이번 달 제보가 아직 없어요</div>';
    return;
  }
  const maxCount = top[0][1].count;
  area.innerHTML = top.map(([key, info], i) => `
    <div class="rank-item">
      <div class="rank-badge">${i + 1}</div>
      <div class="rank-body">
        <div class="rank-name">${escapeHtml(info.nickname)}</div>
        <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${(info.count / maxCount) * 100}%"></div></div>
      </div>
      <div class="rank-count">${info.count}건</div>
    </div>`).join('');
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

loadStats();
</script>
</body>
</html>
