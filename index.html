<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>우리 지역 식물 지도</title>

<!-- ============================================================
  구글 폰트: 표제용 세리프(Fraunces) + 본문용 산세리프(Work Sans)
============================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --forest:#1F3D2B;      /* 짙은 숲 초록 - 헤더/포인트 */
    --moss:#4A7C59;        /* 이끼 초록 - 보조 요소, 마커 */
    --paper:#F2ECDE;       /* 채집대장 종이색 - 배경 */
    --coral:#C97B63;       /* 마른 열매빛 코랄 - 강조 버튼 */
    --ink:#2B2620;         /* 잉크색 - 본문 텍스트 */
    --gold:#D4A94A;        /* 압화 라벨 금색 - 뱃지 */
    --line:#D8CDB4;        /* 종이 위 실선 */
    --card:#FBF8F0;        /* 카드 배경(종이보다 살짝 밝음) */
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    background:var(--paper);
    overflow:hidden;
  }

  /* ---------- 상단 헤더 ---------- */
  header{
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    background:var(--forest);
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
  }
  .brand svg{width:26px; height:26px; flex-shrink:0;}
  .brand h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:20px;
    color:var(--paper);
    letter-spacing:.2px;
  }
  .brand .sub{
    display:block;
    font-family:'Work Sans', sans-serif;
    font-size:11px;
    font-weight:500;
    color:#C9D8C4;
    letter-spacing:.5px;
  }
  .header-badge{
    font-size:12px;
    color:var(--paper);
    background:rgba(255,255,255,.12);
    padding:6px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.25);
    white-space:nowrap;
  }

  /* ---------- 지도 영역 ---------- */
  #map{
    position:absolute; inset:0;
    width:100%; height:100%;
    background:#E4DEC9; /* 카카오맵 로드 전 임시 배경 */
  }

  /* ---------- 검색창 (지도 위 플로팅) ---------- */
  .search-wrap{
    position:fixed; top:72px; left:50%; transform:translateX(-50%);
    z-index:40; width:min(420px, 90vw);
  }
  .search-box{
    display:flex; align-items:center; gap:8px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 14px;
    box-shadow:0 6px 20px rgba(31,61,43,.12);
  }
  .search-box input{
    flex:1; border:none; outline:none; background:transparent;
    font-family:'Work Sans', sans-serif; font-size:14px; color:var(--ink);
  }
  .search-box input::placeholder{color:#9A9078;}
  .search-box svg{width:18px; height:18px; color:var(--moss); flex-shrink:0;}

  /* ---------- 카테고리 필터 칩 ---------- */
  .filter-row{
    position:fixed; top:128px; left:50%; transform:translateX(-50%);
    z-index:39;
    display:flex; gap:8px; overflow-x:auto;
    width:min(520px, 92vw);
    padding:2px;
    scrollbar-width:none;
  }
  .filter-row::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;
    display:flex; align-items:center; gap:6px;
    font-size:13px; font-weight:500;
    padding:7px 14px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:999px;
    color:var(--ink);
    cursor:pointer;
    white-space:nowrap;
    transition:.15s ease;
  }
  .chip.active{
    background:var(--moss);
    border-color:var(--moss);
    color:var(--paper);
  }
  .chip:hover{border-color:var(--moss);}

  /* ---------- 하단 우측 플로팅 버튼들 ---------- */
  .fab-stack{
    position:fixed; right:18px; bottom:26px; z-index:41;
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .fab{
    width:48px; height:48px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--card);
    border:1px solid var(--line);
    box-shadow:0 6px 16px rgba(31,61,43,.18);
    cursor:pointer;
  }
  .fab svg{width:22px; height:22px; color:var(--forest);}
  .fab-report{
    width:auto; height:52px; padding:0 20px; border-radius:26px;
    background:var(--coral); border:none;
    display:flex; align-items:center; gap:8px;
    color:#fff; font-family:'Work Sans',sans-serif; font-weight:600; font-size:14px;
    box-shadow:0 8px 20px rgba(201,123,99,.4);
  }
  .fab-report svg{width:18px; height:18px; color:#fff;}

  /* ---------- 좌측 하단 범례/카운트 ---------- */
  .legend{
    position:fixed; left:18px; bottom:26px; z-index:39;
    background:var(--card);
    border:1px dashed var(--line);
    border-radius:12px;
    padding:10px 14px;
    font-size:12px;
    color:var(--ink);
    box-shadow:0 4px 12px rgba(31,61,43,.1);
  }
  .legend b{color:var(--forest); font-family:'Fraunces',serif; font-size:15px;}

  /* ---------- 표본 라벨(인포윈도우) 스타일 참고용 ---------- */
  .specimen-card{
    font-family:'Work Sans', sans-serif;
    background:var(--card);
    border:1.5px dashed var(--moss);
    border-radius:8px;
    padding:10px 12px;
    min-width:170px;
  }
  .specimen-card .name{
    font-family:'Fraunces', serif;
    font-weight:600; font-size:15px; color:var(--forest);
  }
  .specimen-card .desc{font-size:12px; color:var(--ink); margin-top:4px; line-height:1.4;}
  .specimen-card .reporter{
    margin-top:6px; font-size:11px; color:#7A7360; display:flex; align-items:center; gap:4px;
  }

  @media (max-width:480px){
    .brand h1{font-size:17px;}
    .header-badge{display:none;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="#F2ECDE" stroke-width="1.6"><path d="M12 22V12M12 12C12 12 6 12 6 6C6 3 8 2 12 2C16 2 18 3 18 6C18 12 12 12 12 12Z"/><path d="M12 12C12 12 17 12 17 17C17 20 15 21 12 21"/><path d="M12 12C12 12 7 12 7 17C7 20 9 21 12 21"/></svg>
    <div>
      <h1>우리 지역 식물 지도</h1>
      <span class="sub">동네 곳곳의 식물을 함께 기록해요</span>
    </div>
  </div>
  <div class="header-badge">🌿 등록된 식물 128종</div>
</header>

<div id="map"></div>

<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
    <input id="searchInput" type="text" placeholder="식물 이름으로 검색 (예: 벚나무)" />
  </div>
</div>

<div class="filter-row" id="filterRow">
  <div class="chip active" data-cat="all">전체</div>
  <div class="chip" data-cat="tree">🌳 나무</div>
  <div class="chip" data-cat="flower">🌸 꽃</div>
  <div class="chip" data-cat="grass">🌱 풀</div>
  <div class="chip" data-cat="etc">🍀 기타</div>
</div>

<div class="legend">
  <b id="visibleCount">32</b> 개 표시 중
</div>

<div class="fab-stack">
  <div class="fab" id="gpsBtn" title="현재 위치로 이동">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
  </div>
  <button class="fab-report" id="reportBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    제보하기
  </button>
</div>

<!-- ============================================================
  ⚠️ 카카오맵 SDK 불러오기
  아래 "여기에_카카오맵_API_키" 부분을 발급받은 앱 키로 바꿔주세요.
  (자세한 방법은 함께 드린 "시작-가이드.md" 문서의 1단계 참고)
============================================================= -->
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d66f62ed4397eb5431babcbb216b449f&libraries=clusterer&autoload=false"></script>

<script>
/* ============================================================
   설정값 모음 — 이 프로젝트에서 손대야 할 값들을 한 곳에 모아뒀어요.
============================================================= */
const CONFIG = {
  // ⚠️ Supabase 프로젝트 만들고 나면 아래 두 값을 채워주세요.
  // 위치: Supabase 대시보드 > Project Settings > API
  SUPABASE_URL: "https://tdyhuausauyqnclmzjin.supabase.co/rest/v1/",
  SUPABASE_ANON_KEY: "sb_publishable_ly243x1R040NH714t21Gew_kvcBc1SH",
  DEFAULT_CENTER: { lat: 37.5665, lng: 126.9780 }, // 기본 지도 중심 (예: 서울시청). 우리 동네 좌표로 바꿔주세요.
  DEFAULT_LEVEL: 6
};

/* ============================================================
   임시 샘플 데이터
   실제로는 Supabase의 reports 테이블에서 status='approved' 인
   데이터만 불러와서 이 배열 자리에 채워 넣게 됩니다.
   (연결 방법은 가이드 문서의 "3단계" 참고)
============================================================= */
const SAMPLE_PLANTS = [
  { id:1, lat:37.5665, lng:126.9780, name:"벚나무", desc:"4월 초 개화, 공원 산책로 입구", cat:"tree", reporter:"철수", photo:"" },
  { id:2, lat:37.5680, lng:126.9820, name:"민들레", desc:"보도블록 틈, 노란 꽃 다수", cat:"flower", reporter:"초록지킴이", photo:"" },
  { id:3, lat:37.5650, lng:126.9750, name:"강아지풀", desc:"공터 전체에 군락", cat:"grass", reporter:"익명", photo:"" },
  { id:4, lat:37.5700, lng:126.9800, name:"진달래", desc:"등산로 초입 능선", cat:"flower", reporter:"산책러버", photo:"" }
];

let map, clusterer, markers = [];

function initMap(){
  const container = document.getElementById('map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(CONFIG.DEFAULT_CENTER.lat, CONFIG.DEFAULT_CENTER.lng),
    level: CONFIG.DEFAULT_LEVEL
  });

  clusterer = new kakao.maps.MarkerClusterer({
    map: map,
    averageCenter: true,
    minLevel: 7,
    disableClickZoom: false
  });

  renderPlants(SAMPLE_PLANTS);
}

function renderPlants(list){
  // 기존 마커 제거
  clusterer.clear();
  markers = [];

  list.forEach(p => {
    const pos = new kakao.maps.LatLng(p.lat, p.lng);
    const marker = new kakao.maps.Marker({ position: pos, title: p.name });

    const infoHtml = `
      <div class="specimen-card">
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="desc">${escapeHtml(p.desc)}</div>
        <div class="reporter">🌿 제보자: ${escapeHtml(p.reporter || '익명')}</div>
      </div>`;
    const infowindow = new kakao.maps.CustomOverlay({
      position: pos,
      content: infoHtml,
      yAnchor: 1.4
    });

    kakao.maps.event.addListener(marker, 'click', () => {
      infowindow.setMap(map);
      setTimeout(() => infowindow.setMap(null), 4000);
    });

    markers.push(marker);
  });

  clusterer.addMarkers(markers);
  document.getElementById('visibleCount').textContent = list.length;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[s]));
}

/* ---------- 검색 ---------- */
document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  const filtered = SAMPLE_PLANTS.filter(p => p.name.toLowerCase().includes(q));
  renderPlants(q ? filtered : applyActiveCategory(SAMPLE_PLANTS));
});

/* ---------- 카테고리 필터 ---------- */
let activeCat = 'all';
document.getElementById('filterRow').addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if(!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeCat = chip.dataset.cat;
  renderPlants(applyActiveCategory(SAMPLE_PLANTS));
});
function applyActiveCategory(list){
  return activeCat === 'all' ? list : list.filter(p => p.cat === activeCat);
}

/* ---------- GPS 버튼 ---------- */
document.getElementById('gpsBtn').addEventListener('click', () => {
  if(!navigator.geolocation){ alert('이 브라우저는 위치 기능을 지원하지 않아요.'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const loc = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
    map.panTo(loc);
  }, () => alert('위치 정보를 가져올 수 없어요. 브라우저 위치 권한을 확인해주세요.'));
});

/* ---------- 제보하기 버튼 ---------- */
document.getElementById('reportBtn').addEventListener('click', () => {
  // ⚠️ 제보 폼 페이지를 만들면 여기서 이동시키면 됩니다. 예: location.href = 'report.html';
  alert('제보 폼 페이지는 다음 단계에서 만들어요! (가이드 문서 "다음 단계" 참고)');
});

/* ---------- 카카오맵 로드 ---------- */
kakao.maps.load(initMap);
</script>
</body>
</html>
