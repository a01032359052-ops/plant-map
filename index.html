<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<title>우리 지역 식물 지도</title>

<!-- ============================================================
  구글 폰트: 표제용 세리프(Fraunces) + 본문용 산세리프(Work Sans)
============================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  :root{
    --forest:#1F3D2B;      /* 짙은 숲 초록 - 헤더/포인트 */
    --moss:#4A7C59;        /* 이끼 초록 - 보조 요소, 마커 */
    --paper:#F2ECDE;       /* 채집대장 종이색 - 배경 */
    --coral:#C97B63;       /* 마른 열매빛 코랄 - 강조 버튼 */
    --ink:#2B2620;         /* 잉크색 - 본문 텍스트 */
    --gold:#D4A94A;        /* 압화 라벨 금색 - 뱃지 */
    --line:#D8CDB4;        /* 종이 위 실선 */
    --card:#FBF8F0;        /* 카드 배경(종이보다 살짝 밝음) */
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    background:var(--paper);
  }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px;
    background:var(--forest);
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
  }
  .brand svg{width:26px; height:26px; flex-shrink:0;}
  .brand h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:20px;
    color:var(--paper);
    letter-spacing:.2px;
  }
  .brand .sub{
    display:block;
    font-family:'Work Sans', sans-serif;
    font-size:11px;
    font-weight:500;
    color:#C9D8C4;
    letter-spacing:.5px;
  }
  .header-badge{
    font-size:12px;
    color:var(--paper);
    background:rgba(255,255,255,.12);
    padding:6px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.25);
    white-space:nowrap;
  }

  main{
    max-width:1000px;
    margin:0 auto;
    padding:32px 20px 60px;
  }
  .intro{
    margin-bottom:24px;
  }
  .intro h2{
    font-family:'Fraunces', serif;
    font-size:24px;
    color:var(--forest);
    margin-bottom:8px;
  }
  .intro p{
    font-size:14px;
    color:#5C5544;
    line-height:1.6;
  }

  .map-frame{
    position:relative;
    width:100%;
    height:440px;
    border-radius:18px;
    overflow:hidden;
    border:1px solid var(--line);
    box-shadow:0 10px 30px rgba(31,61,43,.12);
  }
  #map{
    position:absolute; inset:0;
    width:100%; height:100%;
    background:#E4DEC9;
    overflow:hidden;
  }
  #map svg{width:100%; height:100%; display:block;}

  .toolbar{
    display:flex; align-items:center; gap:10px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  .search-box{
    display:flex; align-items:center; gap:8px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 14px;
    width:min(320px, 100%);
    box-shadow:0 2px 8px rgba(31,61,43,.06);
  }
  .search-box input{
    flex:1; border:none; outline:none; background:transparent;
    font-family:'Work Sans', sans-serif; font-size:14px; color:var(--ink);
  }
  .search-box input::placeholder{color:#9A9078;}
  .search-box svg{width:18px; height:18px; color:var(--moss); flex-shrink:0;}

  .filter-row{
    display:flex; gap:8px; overflow-x:auto;
    padding:2px;
    scrollbar-width:none;
  }
  .filter-row::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;
    display:flex; align-items:center; gap:6px;
    font-size:13px; font-weight:500;
    padding:7px 14px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:999px;
    color:var(--ink);
    cursor:pointer;
    white-space:nowrap;
    transition:.15s ease;
  }
  .chip.active{
    background:var(--moss);
    border-color:var(--moss);
    color:var(--paper);
  }
  .chip:hover{border-color:var(--moss);}

  .map-controls{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    margin-top:14px;
    flex-wrap:wrap;
  }
  .legend{
    background:var(--card);
    border:1px dashed var(--line);
    border-radius:12px;
    padding:8px 14px;
    font-size:12px;
    color:var(--ink);
  }
  .legend b{color:var(--forest); font-family:'Fraunces',serif; font-size:15px;}

  .geo-note{
    margin-top:10px;
    padding:10px 12px;
    background:rgba(201,123,99,.12);
    border:1px solid rgba(201,123,99,.25);
    border-radius:10px;
    color:#7A4A36;
    font-size:12px;
    line-height:1.5;
    display:none;
  }

  .action-buttons{
    display:flex; align-items:center; gap:10px;
  }
  .btn-gps{
    width:44px; height:44px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--card);
    border:1px solid var(--line);
    box-shadow:0 2px 8px rgba(31,61,43,.08);
    cursor:pointer;
    touch-action:manipulation;
  }
  .btn-gps svg{width:20px; height:20px; color:var(--forest);}
  .btn-report{
    width:auto; height:46px; padding:0 20px; border-radius:23px;
    background:var(--coral); border:none;
    display:flex; align-items:center; gap:8px;
    color:#fff; font-family:'Work Sans',sans-serif; font-weight:600; font-size:14px;
    box-shadow:0 6px 16px rgba(201,123,99,.35);
    cursor:pointer;
    touch-action:manipulation;
  }
  .btn-report svg{width:17px; height:17px; color:#fff;}

  /* ---------- 표본 라벨(인포윈도우) + 반응 버튼 ---------- */
  .specimen-card{
    font-family:'Work Sans', sans-serif;
    background:var(--card);
    border:1.5px dashed var(--moss);
    border-radius:8px;
    padding:10px 12px;
    min-width:190px;
  }
  .specimen-card .name{
    font-family:'Fraunces', serif;
    font-weight:600; font-size:15px; color:var(--forest);
  }
  .specimen-card .desc{font-size:12px; color:var(--ink); margin-top:4px; line-height:1.4;}
  .specimen-card .reporter{
    margin-top:6px; font-size:11px; color:#7A7360; display:flex; align-items:center; gap:4px;
  }
  .specimen-card .reaction-row{
    margin-top:8px; padding-top:8px; border-top:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .specimen-card .reaction-count{ font-size:11px; color:#6B6450; }
  .reaction-btn{
    display:flex; align-items:center; gap:5px;
    border:1px solid var(--moss); background:var(--paper);
    color:var(--forest); font-family:'Work Sans',sans-serif; font-weight:600;
    font-size:12px; padding:5px 10px; border-radius:999px; cursor:pointer;
    touch-action:manipulation;
  }
  .reaction-btn.mine{ background:var(--moss); color:var(--paper); }

  /* ---------- 하단 관리자 링크 (눈에 잘 안 띄게, 작게) ---------- */
  .admin-link-row{
    text-align:center; margin-top:28px;
  }
  .admin-link-row a{
    font-size:11px; color:#B0A688; text-decoration:none;
  }
  .admin-link-row a:hover{ color:#7A7360; text-decoration:underline; }

  @media (max-width:480px){
    body{padding-bottom:calc(24px + env(safe-area-inset-bottom));}
    header{padding:14px 16px;}
    .brand h1{font-size:17px;}
    .header-badge{display:none;}
    main{padding:20px 14px 40px;}
    .intro h2{font-size:20px;}
    .toolbar{flex-direction:column; align-items:stretch;}
    .search-box{width:100%;}
    .map-frame{height:min(62vh, 430px); border-radius:14px;}
    .map-controls{flex-direction:column; align-items:stretch;}
    .legend{width:100%; text-align:center;}
    .action-buttons{justify-content:space-between; width:100%;}
    .btn-report{flex:1; justify-content:center; height:48px;}
    .btn-gps{width:48px; height:48px;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="#F2ECDE" stroke-width="1.6"><path d="M12 22V12M12 12C12 12 6 12 6 6C6 3 8 2 12 2C16 2 18 3 18 6C18 12 12 12 12 12Z"/><path d="M12 12C12 12 17 12 17 17C17 20 15 21 12 21"/><path d="M12 12C12 12 7 12 7 17C7 20 9 21 12 21"/></svg>
    <div>
      <h1>우리 지역 식물 지도</h1>
      <span class="sub">동네 곳곳의 식물을 함께 기록해요</span>
    </div>
  </div>
  <div class="header-badge" id="headerBadge">🌿 등록된 식물 -종</div>
</header>

<main>
  <div class="intro">
    <h2>우리 동네에서 발견한 식물들</h2>
    <p>주민들이 직접 제보한 동네 식물 지도예요. 핀을 눌러 정보를 확인하고, "도움이 되었어요" 버튼으로 실제로 있는지 알려주세요.</p>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="searchInput" type="text" placeholder="식물 이름으로 검색 (예: 벚나무)" />
    </div>
    <div class="filter-row" id="filterRow">
      <div class="chip active" data-cat="all">전체</div>
      <div class="chip" data-cat="tree">🌳 나무</div>
      <div class="chip" data-cat="flower">🌸 꽃</div>
      <div class="chip" data-cat="grass">🌱 풀</div>
      <div class="chip" data-cat="etc">🍀 기타</div>
    </div>
  </div>

  <div class="map-frame">
    <div id="map"></div>
  </div>

  <div class="map-controls">
    <div class="legend">
      <b id="visibleCount">0</b> 개 표시 중
    </div>
    <div class="geo-note" id="geoNote">위치 권한은 HTTPS 주소나 브라우저 설정에서 허용해야 작동합니다.</div>
    <div class="action-buttons">
      <div class="btn-gps" id="gpsBtn" title="현재 위치로 이동">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </div>
      <button class="btn-report" id="reportBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        제보하기
      </button>
    </div>
  </div>
</main>

<div class="admin-link-row">
  <a href="admin.html">관리자</a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   설정값 모음
   ⚠️ SUPABASE_URL은 "https://xxxx.supabase.co" 형태까지만 넣어주세요.
   뒤에 "/rest/v1/" 를 붙이면 안 돼요 (supabase-js가 알아서 붙여줘요).
============================================================= */
const CONFIG = {
  SUPABASE_URL: "https://tdyhuausauyqnclmzjin.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_ly243x1R040NH714t21Gew_kvcBc1SH",
  DEFAULT_CENTER: { lat: 37.5665, lng: 126.9780 },
  DEFAULT_LEVEL: 13
};

const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

/* Supabase 연결 실패 시 화면이 비어보이지 않게 쓰는 예시 데이터 */
const FALLBACK_SAMPLE = [
  { id:'s1', lat:37.5665, lng:126.9780, plant_name:"벚나무", description:"4월 초 개화, 공원 산책로 입구", category:"tree", nickname:"철수" },
  { id:'s2', lat:37.5680, lng:126.9820, plant_name:"민들레", description:"보도블록 틈, 노란 꽃 다수", category:"flower", nickname:"초록지킴이" },
  { id:'s3', lat:37.5650, lng:126.9750, plant_name:"강아지풀", description:"공터 전체에 군락", category:"grass", nickname:"익명" },
  { id:'s4', lat:37.5700, lng:126.9800, plant_name:"진달래", description:"등산로 초입 능선", category:"flower", nickname:"산책러버" }
];

let map, markers = [], activeCat = 'all';
let ALL_PLANTS = [];
let REACTION_COUNTS = {};     // { report_id: 개수 }
let MY_REACTIONS = new Set(); // 내(이 기기)가 이미 반응 남긴 report_id

/* ---------- device_id: report.html과 동일한 방식 ---------- */
function getDeviceId(){
  let id = localStorage.getItem('plant_device_id');
  if(!id){
    id = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('plant_device_id', id);
  }
  return id;
}

function initMap(){
  const container = document.getElementById('map');
  map = L.map(container, {
    zoomControl: true,
    attributionControl: true
  }).setView([CONFIG.DEFAULT_CENTER.lat, CONFIG.DEFAULT_CENTER.lng], CONFIG.DEFAULT_LEVEL);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  setTimeout(() => map.invalidateSize(), 0);
  window.addEventListener('resize', () => map.invalidateSize());
  window.addEventListener('orientationchange', () => setTimeout(() => map.invalidateSize(), 120));

  loadData();
  requestGeoLocation(true);
}

/* ---------- Supabase에서 승인된 제보 + 반응 데이터 불러오기 ---------- */
async function loadData(){
  const deviceId = getDeviceId();
  try{
    const { data: reports, error: reportsError } = await supabaseClient
      .from('reports')
      .select('*')
      .eq('status', 'approved');
    if(reportsError) throw reportsError;

    ALL_PLANTS = reports || [];

    const { data: reactions, error: reactionsError } = await supabaseClient
      .from('reactions')
      .select('report_id, device_id');
    if(reactionsError) throw reactionsError;

    REACTION_COUNTS = {};
    MY_REACTIONS = new Set();
    (reactions || []).forEach(r => {
      REACTION_COUNTS[r.report_id] = (REACTION_COUNTS[r.report_id] || 0) + 1;
      if(r.device_id === deviceId){ MY_REACTIONS.add(r.report_id); }
    });

  }catch(err){
    console.warn('Supabase 데이터를 불러오지 못해 예시 데이터로 표시합니다:', err.message);
    ALL_PLANTS = FALLBACK_SAMPLE;
    REACTION_COUNTS = {};
    MY_REACTIONS = new Set();
  }

  document.getElementById('headerBadge').textContent = `🌿 등록된 식물 ${ALL_PLANTS.length}종`;
  renderPlants(applyActiveCategory(ALL_PLANTS));
}

function buildPopupHtml(p){
  const count = REACTION_COUNTS[p.id] || 0;
  const isMine = MY_REACTIONS.has(p.id);
  return `
    <div class="specimen-card" data-report-id="${p.id}">
      <div class="name">${escapeHtml(p.plant_name || '이름 미정')}</div>
      <div class="desc">${escapeHtml(p.description || '')}</div>
      <div class="reporter">🌿 제보자: ${escapeHtml(p.nickname || '익명')}</div>
      <div class="reaction-row">
        <span class="reaction-count">👍 <span class="count-num">${count}</span>명에게 도움이 되었어요</span>
        <button class="reaction-btn ${isMine ? 'mine' : ''}" data-id="${p.id}">
          ${isMine ? '도움됨' : '도움이 되었어요'}
        </button>
      </div>
    </div>`;
}

function renderPlants(list){
  markers.forEach(marker => map.removeLayer(marker));
  markers = [];

  list.forEach(p => {
    if(p.lat == null || p.lng == null) return;
    const marker = L.marker([p.lat, p.lng]).addTo(map);
    marker.bindPopup(buildPopupHtml(p), { autoPan: true });

    marker.on('popupopen', (e) => {
      const el = e.popup.getElement();
      const btn = el.querySelector('.reaction-btn');
      if(btn){
        btn.addEventListener('click', () => toggleReaction(p.id, marker));
      }
    });

    markers.push(marker);
  });

  document.getElementById('visibleCount').textContent = list.length;
}

/* ---------- 반응(도움이 되었어요) 토글 ---------- */
async function toggleReaction(reportId, marker){
  const deviceId = getDeviceId();
  const alreadyReacted = MY_REACTIONS.has(reportId);

  try{
    if(alreadyReacted){
      const { error } = await supabaseClient
        .from('reactions')
        .delete()
        .eq('report_id', reportId)
        .eq('device_id', deviceId);
      if(error) throw error;
      MY_REACTIONS.delete(reportId);
      REACTION_COUNTS[reportId] = Math.max(0, (REACTION_COUNTS[reportId] || 1) - 1);
    }else{
      const { error } = await supabaseClient
        .from('reactions')
        .insert({ report_id: reportId, device_id: deviceId });
      if(error) throw error;
      MY_REACTIONS.add(reportId);
      REACTION_COUNTS[reportId] = (REACTION_COUNTS[reportId] || 0) + 1;
    }

    const plant = ALL_PLANTS.find(p => p.id === reportId);
    if(plant && marker.isPopupOpen()){
      marker.setPopupContent(buildPopupHtml(plant));
      const el = marker.getPopup().getElement();
      const btn = el.querySelector('.reaction-btn');
      if(btn){ btn.addEventListener('click', () => toggleReaction(reportId, marker)); }
    }
  }catch(err){
    console.error(err);
    alert('반응을 저장하지 못했어요. 잠시 후 다시 시도해주세요.');
  }
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[s]));
}

/* ---------- 검색 ---------- */
document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  const filtered = ALL_PLANTS.filter(p => (p.plant_name || '').toLowerCase().includes(q));
  renderPlants(q ? filtered : applyActiveCategory(ALL_PLANTS));
});

/* ---------- 카테고리 필터 ---------- */
document.getElementById('filterRow').addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if(!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeCat = chip.dataset.cat;
  renderPlants(applyActiveCategory(ALL_PLANTS));
});
function applyActiveCategory(list){
  if(activeCat === 'all') return list;
  return list.filter(p => (p.category || 'etc') === activeCat);
}

/* ---------- GPS 위치 요청 (모바일 최적화) ---------- */
function requestGeoLocation(showMessage){
  const note = document.getElementById('geoNote');
  const onError = (err) => {
    const detail = err && err.code === 1 ? '사용자가 권한을 거부했습니다' : err && err.code === 2 ? '위치 정보를 찾을 수 없습니다' : err && err.code === 3 ? '위치 요청이 시간 초과됐습니다' : '위치 요청에 실패했습니다';
    if(showMessage){
      note.textContent = `${detail}. 모바일에서는 브라우저 설정에서 위치 권한을 허용한 뒤 다시 눌러주세요.`;
      note.style.display = 'block';
    }
  };

  if(!navigator.geolocation){
    if(showMessage){
      note.textContent = '이 브라우저는 위치 기능을 지원하지 않습니다.';
      note.style.display = 'block';
    }
    return;
  }
  if(location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1'){
    if(showMessage){
      note.textContent = '모바일에서는 HTTPS 주소로 열었을 때 위치 권한이 더 안정적으로 작동합니다.';
      note.style.display = 'block';
    }
    return;
  }
  if(showMessage){
    note.textContent = '위치 권한을 확인하는 중입니다. 브라우저가 권한 요청을 표시하면 허용해 주세요.';
    note.style.display = 'block';
  }
  navigator.geolocation.getCurrentPosition(pos => {
    if(showMessage){ note.textContent = '현재 위치로 지도를 이동했습니다.'; }
    map.panTo([pos.coords.latitude, pos.coords.longitude]);
  }, onError, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
}

/* ---------- GPS 버튼 ---------- */
document.getElementById('gpsBtn').addEventListener('click', () => requestGeoLocation(true));

/* ---------- 제보하기 버튼: report.html로 이동 ---------- */
document.getElementById('reportBtn').addEventListener('click', () => {
  location.href = 'report.html';
});

/* ---------- 지도 초기화 ---------- */
document.addEventListener('DOMContentLoaded', initMap);
</script>
</body>
