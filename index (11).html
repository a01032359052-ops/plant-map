<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<title>우리 지역 식물 지도</title>

<!-- ============================================================
  구글 폰트: 표제용 세리프(Fraunces) + 본문용 산세리프(Work Sans)
============================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>
  :root{
    --forest:#1F3D2B;      /* 짙은 숲 초록 - 헤더/포인트 */
    --moss:#4A7C59;        /* 이끼 초록 - 보조 요소, 마커 */
    --paper:#F2ECDE;       /* 채집대장 종이색 - 배경 */
    --coral:#C97B63;       /* 마른 열매빛 코랄 - 강조 버튼 */
    --ink:#2B2620;         /* 잉크색 - 본문 텍스트 */
    --gold:#D4A94A;        /* 압화 라벨 금색 - 뱃지 */
    --line:#D8CDB4;        /* 종이 위 실선 */
    --card:#FBF8F0;        /* 카드 배경(종이보다 살짝 밝음) */
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    background:var(--paper);
  }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px;
    background:var(--forest);
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
  }
  .brand svg{width:34px; height:34px; flex-shrink:0; filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));}
  .brand h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:20px;
    color:var(--paper);
    letter-spacing:.2px;
  }
  .brand .sub{
    display:block;
    font-family:'Work Sans', sans-serif;
    font-size:11px;
    font-weight:500;
    color:#C9D8C4;
    letter-spacing:.5px;
  }
  .header-badge{
    font-size:12px;
    color:var(--paper);
    background:rgba(255,255,255,.12);
    padding:6px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.25);
    white-space:nowrap;
  }
  .header-right{
    display:flex; align-items:center; gap:8px; flex-shrink:0;
  }
  .admin-btn{
    display:flex; align-items:center; justify-content:center;
    width:32px; height:32px; border-radius:50%; flex-shrink:0;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.25);
    color:var(--paper); text-decoration:none;
    touch-action:manipulation;
  }
  .admin-btn svg{ width:16px; height:16px; }

  main{
    max-width:1000px;
    margin:0 auto;
    padding:32px 20px 60px;
  }
  .intro{
    margin-bottom:24px;
  }
  .intro h2{
    font-family:'Fraunces', serif;
    font-size:24px;
    color:var(--forest);
    margin-bottom:8px;
  }
  .intro p{
    font-size:14px;
    color:#5C5544;
    line-height:1.6;
  }
  .intro-row{
    display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .stats-link{
    flex-shrink:0;
    display:inline-flex; align-items:center; gap:6px;
    font-size:13px; font-weight:600; color:var(--forest);
    background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:8px 14px; text-decoration:none;
    white-space:nowrap;
  }
  .stats-link:hover{ border-color:var(--moss); }

  .map-frame{
    position:relative;
    width:100%;
    height:440px;
    border-radius:18px;
    overflow:hidden;
    border:1px solid var(--line);
    box-shadow:0 10px 30px rgba(31,61,43,.12);
  }
  #map{
    position:absolute; inset:0;
    width:100%; height:100%;
    background:#E4DEC9;
    overflow:hidden;
    z-index:1; /* 바텀시트(999)/백드롭(998)보다 항상 아래에 고정 */
  }
  #map svg{width:100%; height:100%; display:block;}

  .toolbar{
    display:flex; align-items:center; gap:10px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  .search-box{
    display:flex; align-items:center; gap:8px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 14px;
    width:min(320px, 100%);
    box-shadow:0 2px 8px rgba(31,61,43,.06);
  }
  .search-box input{
    flex:1; border:none; outline:none; background:transparent;
    font-family:'Work Sans', sans-serif; font-size:14px; color:var(--ink);
  }
  .search-box input::placeholder{color:#9A9078;}
  .search-box svg{width:18px; height:18px; color:var(--moss); flex-shrink:0;}

  .filter-row{
    display:flex; gap:8px; overflow-x:auto;
    padding:2px;
    scrollbar-width:none;
  }
  .filter-row::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;
    display:flex; align-items:center; gap:6px;
    font-size:13px; font-weight:500;
    padding:7px 14px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:999px;
    color:var(--ink);
    cursor:pointer;
    white-space:nowrap;
    transition:.15s ease;
  }
  .chip.active{
    background:var(--moss);
    border-color:var(--moss);
    color:var(--paper);
  }
  .chip:hover{border-color:var(--moss);}

  .map-controls{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    margin-top:14px;
    flex-wrap:wrap;
  }
  .legend{
    background:var(--card);
    border:1px dashed var(--line);
    border-radius:12px;
    padding:8px 14px;
    font-size:12px;
    color:var(--ink);
  }
  .legend b{color:var(--forest); font-family:'Fraunces',serif; font-size:15px;}

  .geo-note{
    margin-top:10px;
    padding:10px 12px;
    background:rgba(201,123,99,.12);
    border:1px solid rgba(201,123,99,.25);
    border-radius:10px;
    color:#7A4A36;
    font-size:12px;
    line-height:1.5;
    display:none;
  }

  .action-buttons{
    display:flex; align-items:center; gap:10px;
  }
  .btn-gps{
    width:44px; height:44px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--card);
    border:1px solid var(--line);
    box-shadow:0 2px 8px rgba(31,61,43,.08);
    cursor:pointer;
    touch-action:manipulation;
  }
  .btn-gps svg{width:20px; height:20px; color:var(--forest);}
  .btn-report{
    width:auto; height:46px; padding:0 20px; border-radius:23px;
    background:var(--coral); border:none;
    display:flex; align-items:center; gap:8px;
    color:#fff; font-family:'Work Sans',sans-serif; font-weight:600; font-size:14px;
    box-shadow:0 6px 16px rgba(201,123,99,.35);
    cursor:pointer;
    touch-action:manipulation;
  }
  .btn-report svg{width:17px; height:17px; color:#fff;}

  /* ---------- 표본 라벨(인포윈도우) + 반응 버튼 ---------- */
  .specimen-card{
    font-family:'Work Sans', sans-serif;
    background:var(--card);
    border:1.5px dashed var(--moss);
    border-radius:8px;
    padding:10px 12px;
    min-width:190px;
    max-width:230px;
  }
  .specimen-card .photo{
    width:100%; height:120px; object-fit:cover;
    border-radius:6px; margin-bottom:8px; background:#E4DEC9;
  }
  .specimen-card .name{
    font-family:'Fraunces', serif;
    font-weight:600; font-size:15px; color:var(--forest);
  }
  .specimen-card .desc{font-size:12px; color:var(--ink); margin-top:4px; line-height:1.4;}
  .specimen-card .memo{
    font-size:11px; color:#6B6450; margin-top:6px; line-height:1.4;
    background:var(--paper); border-radius:6px; padding:6px 8px;
  }
  .photo-carousel{ position:relative; margin-bottom:8px; }
  .photo-carousel .photo{ margin-bottom:0; }
  .photo-nav-btn{
    position:absolute; top:50%; transform:translateY(-50%);
    width:22px; height:22px; border-radius:50%; border:none;
    background:rgba(43,38,32,.55); color:#fff; font-size:14px; line-height:1;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .photo-nav-btn:disabled{ opacity:.25; cursor:not-allowed; }
  .photo-prev{ left:4px; }
  .photo-next{ right:4px; }
  .photo-counter{
    position:absolute; bottom:4px; right:6px;
    background:rgba(43,38,32,.55); color:#fff; font-size:9px;
    padding:1px 6px; border-radius:999px;
  }
  .specimen-card .photo{ cursor:zoom-in; }

  /* ---------- 사진 크게 보기(라이트박스) ---------- */
  .photo-lightbox{
    position:fixed; inset:0; z-index:9999;
    background:rgba(20,18,14,.9);
    display:none; align-items:center; justify-content:center;
    padding:24px;
  }
  .photo-lightbox.active{ display:flex; }
  .photo-lightbox img{
    max-width:92vw; max-height:88vh; border-radius:10px;
    box-shadow:0 10px 40px rgba(0,0,0,.5);
  }
  .lightbox-close{
    position:absolute; top:18px; right:22px;
    width:36px; height:36px; border-radius:50%;
    background:rgba(255,255,255,.15); color:#fff; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; border:1px solid rgba(255,255,255,.3);
  }
  .group-popup{ min-width:190px; max-width:230px; }
  .group-nav{
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    margin-bottom:6px; padding-bottom:6px; border-bottom:1px solid var(--line);
  }
  .group-nav-btn{
    width:24px; height:24px; border-radius:50%; border:1px solid var(--moss);
    background:var(--paper); color:var(--forest); font-size:11px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .group-nav-btn:disabled{ opacity:.3; cursor:not-allowed; }
  .group-counter{ font-size:10px; color:#7A7360; white-space:nowrap; }
  .specimen-card .reporter{
    margin-top:6px; font-size:11px; color:#7A7360; display:flex; align-items:center; gap:4px;
  }
  .specimen-card .report-date{
    font-size:10px; color:#9A9078; margin-top:2px;
  }
  .specimen-card .reaction-row{
    margin-top:8px; padding-top:8px; border-top:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .specimen-card .reaction-count{ font-size:11px; color:#6B6450; }
  .reaction-btn{
    display:flex; align-items:center; gap:5px;
    border:1px solid var(--moss); background:var(--paper);
    color:var(--forest); font-family:'Work Sans',sans-serif; font-weight:600;
    font-size:12px; padding:5px 10px; border-radius:999px; cursor:pointer;
    touch-action:manipulation;
  }
  .reaction-btn.mine{ background:var(--moss); color:var(--paper); }

  /* ---------- 문의하기 ---------- */
  .inquiry-section{ margin-top:10px; }
  .inquiry-toggle-btn{
    width:100%; text-align:left;
    background:none; border:none; padding:6px 0;
    font-size:11px; color:#9A9078; cursor:pointer;
    text-decoration:underline; text-underline-offset:2px;
  }
  .inquiry-form{ display:none; margin-top:6px; }
  .inquiry-form.open{ display:block; }
  .inquiry-form textarea{
    width:100%; min-height:56px; padding:8px 10px; border:1px solid var(--line); border-radius:8px;
    background:var(--paper); font-family:'Work Sans', sans-serif; font-size:12px; color:var(--ink);
    outline:none; resize:vertical;
  }
  .inquiry-form textarea:focus{ border-color:var(--coral); }
  .inquiry-submit-btn{
    margin-top:6px; padding:7px 14px; border:none; border-radius:8px;
    background:var(--coral); color:#fff; font-size:12px; font-weight:600; cursor:pointer;
  }
  .inquiry-submit-btn:disabled{ opacity:.5; cursor:not-allowed; }
  .inquiry-msg{ margin-top:6px; font-size:11px; color:var(--moss); }

  /* ---------- 핀 정보 바텀시트 ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; z-index:998;
    background:rgba(20,18,14,.4);
    opacity:0; pointer-events:none;
    transition:opacity .22s ease;
  }
  .sheet-backdrop.open{ opacity:1; pointer-events:auto; }
  .bottom-sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:999;
    background:var(--card);
    border-radius:20px 20px 0 0;
    box-shadow:0 -10px 34px rgba(31,61,43,.22);
    max-height:82vh; overflow-y:auto;
    padding:12px 20px calc(22px + env(safe-area-inset-bottom));
    transform:translateY(105%);
    transition:transform .25s ease;
  }
  .bottom-sheet.open{ transform:translateY(0); }
  .sheet-handle{
    width:38px; height:4px; border-radius:999px; background:var(--line);
    margin:2px auto 12px;
  }
  .sheet-close-btn{
    position:absolute; top:14px; right:16px;
    width:30px; height:30px; border-radius:50%;
    background:var(--paper); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:15px; color:var(--forest); cursor:pointer;
  }

  /* 바텀시트 안에서는 표본 카드가 시트에 꽉 차게, 점선 테두리 없이 */
  .bottom-sheet .specimen-card{
    background:transparent; border:none; padding:0; min-width:0; max-width:none;
  }
  .bottom-sheet .specimen-card .photo{ height:220px; }
  .bottom-sheet .specimen-card .name{ font-size:19px; }
  .bottom-sheet .specimen-card .desc{ font-size:14px; }
  .bottom-sheet .specimen-card .memo{ font-size:13px; }
  .bottom-sheet .specimen-card .reporter,
  .bottom-sheet .specimen-card .report-date{ font-size:12px; }
  .bottom-sheet .group-popup{ min-width:0; max-width:none; }
  .bottom-sheet .group-nav{ margin-bottom:10px; padding-bottom:10px; }
  .reaction-btn:disabled{ opacity:.5; cursor:not-allowed; }

  /* ---------- 지도 + 통계 사이드바 레이아웃 (PC) ---------- */
  .map-area{
    display:flex; align-items:flex-start; gap:20px;
  }
  .map-column{ flex:1; min-width:0; }
  .stats-sidebar{
    width:280px; flex-shrink:0;
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:18px;
    box-shadow:0 6px 18px rgba(31,61,43,.06);
  }
  .stats-sidebar h4{
    font-family:'Fraunces', serif; font-size:14px; color:var(--forest);
    margin-bottom:10px; display:flex; align-items:center; gap:6px;
  }
  .mini-rank-list{ display:flex; flex-direction:column; gap:7px; margin-bottom:20px; }
  .mini-rank-item{ display:flex; align-items:center; gap:8px; }
  .mini-rank-badge{
    width:20px; height:20px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces', serif; font-weight:700; font-size:11px;
    background:var(--paper); color:var(--forest); border:1px solid var(--line);
  }
  .mini-rank-name{
    flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    font-size:12px; color:var(--ink);
  }
  .mini-rank-count{ font-size:12px; font-weight:700; color:var(--moss); flex-shrink:0; }
  .empty-mini{ font-size:12px; color:#9A9078; }
  .sidebar-more-link{
    font-size:12px; font-weight:600; color:var(--moss); text-decoration:none;
  }
  .sidebar-more-link:hover{ text-decoration:underline; }

  @media (max-width:900px){
    .map-area{ flex-direction:column; align-items:stretch; }
    .stats-sidebar{ width:100%; }
  }

  @media (max-width:480px){
    body{padding-bottom:calc(24px + env(safe-area-inset-bottom));}
    header{padding:14px 16px;}
    .brand h1{font-size:17px;}
    .header-badge{display:none;}
    .admin-btn{width:34px; height:34px;}
    main{padding:20px 14px 40px;}
    .intro h2{font-size:20px;}
    .toolbar{flex-direction:column; align-items:stretch;}
    .search-box{width:100%;}
    .map-frame{height:min(62vh, 430px); border-radius:14px;}
    .map-controls{flex-direction:column; align-items:stretch;}
    .legend{width:100%; text-align:center;}
    .action-buttons{justify-content:space-between; width:100%;}
    .btn-report{flex:1; justify-content:center; height:48px;}
    .btn-gps{width:48px; height:48px;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#F2ECDE" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 24C18.5 17 17 12 15.5 5.5C19 8 20.5 12.5 20.5 18"/>
      <path d="M20 24C21.5 16 24 11.5 29 7C27.5 12.5 25.5 17.5 21.5 21"/>
      <path d="M20 24C15.5 20 11.5 18 7 17.5C10 21.5 13.5 24.5 18.5 26"/>
      <path d="M11 24Q20 26 29 24L27 33Q20 35 13 33Z"/>
    </svg>
    <div>
      <h1>우리 지역 식물 지도</h1>
      <span class="sub">동네 곳곳의 식물을 함께 기록해요</span>
    </div>
  </div>
  <div class="header-right">
    <div class="header-badge" id="headerBadge">🌿 등록된 식물 -종</div>
    <a class="admin-btn" href="admin.html" title="관리자 페이지" aria-label="관리자 페이지">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    </a>
  </div>
</header>

<main>
  <div class="intro">
    <h2>우리 동네에서 발견한 식물들</h2>
    <p>주민들이 직접 제보한 동네 식물 지도예요. 핀을 눌러 정보를 확인하고, "도움이 되었어요" 버튼으로 실제로 있는지 알려주세요.</p>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="searchInput" type="text" placeholder="식물 이름으로 검색 (예: 벚나무)" />
    </div>
    <div class="filter-row" id="filterRow">
      <div class="chip active" data-cat="all">전체</div>
      <div class="chip" data-cat="tree">🌳 나무</div>
      <div class="chip" data-cat="flower">🌸 꽃</div>
      <div class="chip" data-cat="grass">🌱 풀</div>
      <div class="chip" data-cat="etc">🍀 기타</div>
    </div>
  </div>

  <div class="map-area">
    <div class="map-column">
      <div class="map-frame">
        <div id="map"></div>
      </div>

      <div class="map-controls">
        <div class="legend">
          <b id="visibleCount">0</b> 개 표시 중
        </div>
        <div class="geo-note" id="geoNote">위치 권한은 HTTPS 주소나 브라우저 설정에서 허용해야 작동합니다.</div>
        <div class="action-buttons">
          <div class="btn-gps" id="gpsBtn" title="현재 위치로 이동">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
          </div>
          <button class="btn-report" id="reportBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            제보하기
          </button>
        </div>
      </div>
    </div>

    <aside class="stats-sidebar">
      <h4>🏆 인기 식물 TOP 3</h4>
      <div class="mini-rank-list" id="sidebarTopPlants">
        <div class="empty-mini">불러오는 중...</div>
      </div>
      <h4>🌱 이달의 제보왕 TOP 3</h4>
      <div class="mini-rank-list" id="sidebarTopContributors">
        <div class="empty-mini">불러오는 중...</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   설정값 모음
   ⚠️ SUPABASE_URL은 "https://xxxx.supabase.co" 형태까지만 넣어주세요.
   뒤에 "/rest/v1/" 를 붙이면 안 돼요 (supabase-js가 알아서 붙여줘요).
============================================================= */
const CONFIG = {
  SUPABASE_URL: "https://tdyhuausauyqnclmzjin.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_ly243x1R040NH714t21Gew_kvcBc1SH",
  DEFAULT_CENTER: { lat: 37.5665, lng: 126.9780 },
  DEFAULT_LEVEL: 13
};

const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

/* Supabase 연결 실패 시 화면이 비어보이지 않게 쓰는 예시 데이터 */
const FALLBACK_SAMPLE = [
  { id:'s1', lat:37.5665, lng:126.9780, plant_name:"벚나무", description:"4월 초 개화, 공원 산책로 입구", category:"tree", nickname:"철수" },
  { id:'s2', lat:37.5680, lng:126.9820, plant_name:"민들레", description:"보도블록 틈, 노란 꽃 다수", category:"flower", nickname:"초록지킴이" },
  { id:'s3', lat:37.5650, lng:126.9750, plant_name:"강아지풀", description:"공터 전체에 군락", category:"grass", nickname:"익명" },
  { id:'s4', lat:37.5700, lng:126.9800, plant_name:"진달래", description:"등산로 초입 능선", category:"flower", nickname:"산책러버" }
];

let map, markers = [], activeCat = 'all', markerClusterGroup;
let ALL_PLANTS = [];
let REACTION_COUNTS = {};     // { report_id: 개수 }
let MY_REACTIONS = new Set(); // 내(이 기기)가 이미 반응 남긴 report_id

/* ---------- device_id: report.html과 동일한 방식 ---------- */
function getDeviceId(){
  let id = localStorage.getItem('plant_device_id');
  if(!id){
    id = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('plant_device_id', id);
  }
  return id;
}

function initMap(){
  const container = document.getElementById('map');
  map = L.map(container, {
    zoomControl: true,
    attributionControl: true
  }).setView([CONFIG.DEFAULT_CENTER.lat, CONFIG.DEFAULT_CENTER.lng], CONFIG.DEFAULT_LEVEL);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    subdomains: 'abc',
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  // 지도를 넓게 볼 때 서로 다른 좌표의 핀들이 화면상 겹쳐 보이는 문제를 막기 위한 클러스터 그룹.
  // (같은 좌표 제보를 하나로 묶는 groupByLocation과는 별개로, 줌 레벨에 따라 화면 픽셀 거리 기준으로 묶어준다.)
  // 숫자 배지로 뭉치는 대신, 평범한 핀 하나처럼 보이게 하고 눌렀을 때 카드 넘기기로 확인한다.
  markerClusterGroup = L.markerClusterGroup({
    maxClusterRadius: 50,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: false,
    spiderfyOnMaxZoom: false,
    iconCreateFunction: function(){
      return new L.Icon.Default();
    }
  });
  markerClusterGroup.on('clusterclick', (e) => {
    const combinedGroup = e.layer.getAllChildMarkers()
      .flatMap(m => m._group);
    openBottomSheet({ _group: combinedGroup, _groupIndex: 0, _photoIndex: 0 });
  });
  map.addLayer(markerClusterGroup);

  setTimeout(() => map.invalidateSize(), 0);
  window.addEventListener('resize', () => map.invalidateSize());
  window.addEventListener('orientationchange', () => setTimeout(() => map.invalidateSize(), 120));

  loadData();
  requestGeoLocation(true);
}

/* ---------- Supabase에서 승인된 제보 + 반응 데이터 불러오기 ---------- */
async function loadData(){
  const deviceId = getDeviceId();
  try{
    const { data: reports, error: reportsError } = await supabaseClient
      .from('reports')
      .select('*')
      .eq('status', 'approved');
    if(reportsError) throw reportsError;

    ALL_PLANTS = reports || [];

    const { data: reactions, error: reactionsError } = await supabaseClient
      .from('reactions')
      .select('report_id, device_id');
    if(reactionsError) throw reactionsError;

    REACTION_COUNTS = {};
    MY_REACTIONS = new Set();
    (reactions || []).forEach(r => {
      REACTION_COUNTS[r.report_id] = (REACTION_COUNTS[r.report_id] || 0) + 1;
      if(r.device_id === deviceId){ MY_REACTIONS.add(r.report_id); }
    });

  }catch(err){
    console.warn('Supabase 데이터를 불러오지 못해 예시 데이터로 표시합니다:', err.message);
    ALL_PLANTS = FALLBACK_SAMPLE;
    REACTION_COUNTS = {};
    MY_REACTIONS = new Set();
  }

  document.getElementById('headerBadge').textContent = `🌿 등록된 식물 ${ALL_PLANTS.length}종`;
  renderPlants(applyActiveCategory(ALL_PLANTS));
  renderSidebarStats(ALL_PLANTS);
}

/* ---------- 사이드바: 인기 식물 TOP 3 + 이달의 제보왕 TOP 3 ---------- */
function renderSidebarStats(list){
  const plantsArea = document.getElementById('sidebarTopPlants');
  const contribArea = document.getElementById('sidebarTopContributors');

  // 인기 식물 TOP 3
  const plantCounts = {};
  list.forEach(p => {
    const name = (p.plant_name || '').trim();
    if(!name) return;
    plantCounts[name] = (plantCounts[name] || 0) + 1;
  });
  const topPlants = Object.entries(plantCounts).sort((a, b) => b[1] - a[1]).slice(0, 3);

  if(topPlants.length === 0){
    plantsArea.innerHTML = '<div class="empty-mini">아직 데이터가 없어요</div>';
  }else{
    plantsArea.innerHTML = topPlants.map(([name, count], i) => `
      <div class="mini-rank-item">
        <div class="mini-rank-badge">${i + 1}</div>
        <div class="mini-rank-name">${escapeHtml(name)}</div>
        <div class="mini-rank-count">${count}건</div>
      </div>`).join('');
  }

  // 이달의 제보왕 TOP 3 (이번 달 created_at 기준)
  const now = new Date();
  const monthly = list.filter(p => {
    if(!p.created_at) return false;
    const d = new Date(p.created_at);
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  });
  const contribCounts = {};
  monthly.forEach(p => {
    const key = p.device_id || p.nickname || 'unknown';
    if(!contribCounts[key]){ contribCounts[key] = { count: 0, nickname: p.nickname || '익명' }; }
    contribCounts[key].count += 1;
  });
  const topContrib = Object.entries(contribCounts).sort((a, b) => b[1].count - a[1].count).slice(0, 3);

  if(topContrib.length === 0){
    contribArea.innerHTML = '<div class="empty-mini">이번 달 제보가 없어요</div>';
  }else{
    contribArea.innerHTML = topContrib.map(([key, info], i) => `
      <div class="mini-rank-item">
        <div class="mini-rank-badge">${i + 1}</div>
        <div class="mini-rank-name">${escapeHtml(info.nickname)}</div>
        <div class="mini-rank-count">${info.count}건</div>
      </div>`).join('');
  }
}

function buildPopupHtml(p, photoIndex){
  photoIndex = photoIndex || 0;
  const count = REACTION_COUNTS[p.id] || 0;
  const isMine = MY_REACTIONS.has(p.id);
  const isSample = typeof p.id === 'string' && p.id.startsWith('s'); // FALLBACK_SAMPLE 데이터는 실제 저장이 불가능

  const photoUrls = Array.isArray(p.photo_urls) && p.photo_urls.length > 0
    ? p.photo_urls
    : (p.photo_url ? [p.photo_url] : []);

  let photoHtml = '';
  if(photoUrls.length === 1){
    photoHtml = `<img class="photo" src="${photoUrls[0]}" alt="${escapeHtml(p.plant_name || '식물 사진')}" onerror="this.style.display='none'" />`;
  }else if(photoUrls.length > 1){
    const safeIndex = Math.min(photoIndex, photoUrls.length - 1);
    photoHtml = `
      <div class="photo-carousel">
        <img class="photo" src="${photoUrls[safeIndex]}" alt="${escapeHtml(p.plant_name || '식물 사진')}" onerror="this.style.display='none'" />
        <button type="button" class="photo-nav-btn photo-prev" ${safeIndex === 0 ? 'disabled' : ''} aria-label="이전 사진">‹</button>
        <button type="button" class="photo-nav-btn photo-next" ${safeIndex === photoUrls.length - 1 ? 'disabled' : ''} aria-label="다음 사진">›</button>
        <span class="photo-counter">${safeIndex + 1}/${photoUrls.length}</span>
      </div>`;
  }

  // 설명(admin_desc)은 관리자가 작성한 공개용 텍스트, 항상 표시
  // 메모(description)는 사용자가 남긴 원본 내용, show_memo가 true일 때만 같이 표시
  const descText = p.admin_desc || p.description || '';
  const memoHtml = (p.show_memo && p.description) ? `<div class="memo">💬 ${escapeHtml(p.description)}</div>` : '';

  const dateStr = formatReportDate(p.created_at);
  const reactionButtonHtml = isSample
    ? `<button type="button" class="reaction-btn" disabled title="예시 데이터라 저장할 수 없어요">도움이 되었어요</button>`
    : `<button type="button" class="reaction-btn ${isMine ? 'mine' : ''}" data-id="${p.id}">${isMine ? '도움됨' : '도움이 되었어요'}</button>`;
  const inquiryHtml = isSample ? '' : `
      <div class="inquiry-section">
        <button type="button" class="inquiry-toggle-btn">🚩 위치·정보가 잘못됐나요? 문의하기</button>
        <div class="inquiry-form">
          <textarea class="inquiry-input" placeholder="예: 위치가 실제와 달라요 / 이름이 잘못된 것 같아요"></textarea>
          <button type="button" class="inquiry-submit-btn">문의 보내기</button>
          <div class="inquiry-msg"></div>
        </div>
      </div>`;
  return `
    <div class="specimen-card" data-report-id="${p.id}">
      ${photoHtml}
      <div class="name">${escapeHtml(p.plant_name || '이름 미정')}</div>
      <div class="desc">${escapeHtml(descText)}</div>
      ${memoHtml}
      <div class="reporter">🌿 제보자: ${escapeHtml(p.nickname || '익명')}</div>
      ${dateStr ? `<div class="report-date">📅 제보일: ${dateStr}</div>` : ''}
      <div class="reaction-row">
        <span class="reaction-count">👍 <span class="count-num">${count}</span>명에게 도움이 되었어요</span>
        ${reactionButtonHtml}
      </div>
      ${inquiryHtml}
    </div>`;
}

/* created_at은 제보(INSERT) 시점에 자동으로 찍히는 값이라, 이 값을 그대로 "제보일"로 씀 */
function formatReportDate(createdAt){
  if(!createdAt) return '';
  const d = new Date(createdAt);
  if(isNaN(d.getTime())) return '';
  return d.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' });
}

/* ---------- 사진 크게 보기(라이트박스) ---------- */
function openLightbox(url){
  if(!url) return;
  document.getElementById('lightboxImg').src = url;
  document.getElementById('photoLightbox').classList.add('active');
}
function closeLightbox(){
  document.getElementById('photoLightbox').classList.remove('active');
  document.getElementById('lightboxImg').src = '';
}
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('photoLightbox').addEventListener('click', (e) => {
  if(e.target.id === 'photoLightbox'){ closeLightbox(); } // 배경 클릭 시에만 닫기
});

/* ---------- 같은 위치(좌표)에 있는 제보끼리 묶기 ---------- */
function groupByLocation(list){
  const groups = {};
  list.forEach(p => {
    const key = `${p.lat.toFixed(5)}_${p.lng.toFixed(5)}`;
    if(!groups[key]){ groups[key] = []; }
    groups[key].push(p);
  });
  return Object.values(groups);
}

/* ---------- 한 위치에 여러 제보가 있을 때, 넘겨볼 수 있는 팝업 HTML ---------- */
function buildGroupPopupHtml(group, index, photoIndex){
  const total = group.length;
  const p = group[index];
  const cardHtml = buildPopupHtml(p, photoIndex);
  if(total <= 1) return cardHtml;
  return `
    <div class="group-popup">
      <div class="group-nav">
        <button type="button" class="group-nav-btn group-prev" ${index === 0 ? 'disabled' : ''} aria-label="이전 제보">◀</button>
        <span class="group-counter">이 위치 제보 ${index + 1}/${total}</span>
        <button type="button" class="group-nav-btn group-next" ${index === total - 1 ? 'disabled' : ''} aria-label="다음 제보">▶</button>
      </div>
      ${cardHtml}
    </div>`;
}

/* ---------- 바텀시트 열기/닫기 ---------- */
let currentSheetMarker = null;

function openBottomSheet(marker){
  currentSheetMarker = marker;
  renderSheetContent(marker);
  document.getElementById('bottomSheet').classList.add('open');
  document.getElementById('sheetBackdrop').classList.add('open');
  lockBodyScroll();
}
function closeBottomSheet(){
  document.getElementById('bottomSheet').classList.remove('open');
  document.getElementById('sheetBackdrop').classList.remove('open');
  currentSheetMarker = null;
  unlockBodyScroll();
}

// 바텀시트가 열려있는 동안 배경 페이지가 스크롤되면서 지도가 시트 위로 비쳐 보이는
// 현상(주로 iOS Safari)을 막기 위해, 시트가 열리면 배경 스크롤을 잠근다.
let _scrollLockY = 0;
function lockBodyScroll(){
  _scrollLockY = window.scrollY || window.pageYOffset || 0;
  document.body.style.position = 'fixed';
  document.body.style.top = `-${_scrollLockY}px`;
  document.body.style.left = '0';
  document.body.style.right = '0';
  document.body.style.width = '100%';
}
function unlockBodyScroll(){
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.left = '';
  document.body.style.right = '';
  document.body.style.width = '';
  window.scrollTo(0, _scrollLockY);
}
document.getElementById('sheetCloseBtn').addEventListener('click', closeBottomSheet);
document.getElementById('sheetBackdrop').addEventListener('click', closeBottomSheet);

/* ---------- 바텀시트 내용을 (다시) 그리고, 넘기기/반응 버튼에 이벤트를 연결 ---------- */
function renderSheetContent(marker){
  const group = marker._group;
  const index = marker._groupIndex || 0;
  const photoIndex = marker._photoIndex || 0;
  const html = buildGroupPopupHtml(group, index, photoIndex);
  const el = document.getElementById('sheetContent');
  el.innerHTML = html;

  const prevBtn = el.querySelector('.group-prev');
  const nextBtn = el.querySelector('.group-next');
  const photoPrevBtn = el.querySelector('.photo-prev');
  const photoNextBtn = el.querySelector('.photo-next');
  if(prevBtn){
    prevBtn.addEventListener('click', () => {
      marker._groupIndex = index - 1;
      marker._photoIndex = 0; // 다른 제보로 넘어가면 사진은 첫 장부터
      renderSheetContent(marker);
    });
  }
  if(nextBtn){
    nextBtn.addEventListener('click', () => {
      marker._groupIndex = index + 1;
      marker._photoIndex = 0;
      renderSheetContent(marker);
    });
  }
  if(photoPrevBtn){
    photoPrevBtn.addEventListener('click', () => {
      marker._photoIndex = photoIndex - 1;
      renderSheetContent(marker);
    });
  }
  if(photoNextBtn){
    photoNextBtn.addEventListener('click', () => {
      marker._photoIndex = photoIndex + 1;
      renderSheetContent(marker);
    });
  }

  const reactBtn = el.querySelector('.reaction-btn');
  if(reactBtn && !reactBtn.disabled){
    const p = group[index];
    reactBtn.addEventListener('click', () => toggleReaction(p.id, marker));
  }

  const photoImg = el.querySelector('.specimen-card .photo');
  if(photoImg){
    photoImg.addEventListener('click', () => openLightbox(photoImg.src));
  }

  const inquiryToggleBtn = el.querySelector('.inquiry-toggle-btn');
  const inquiryForm = el.querySelector('.inquiry-form');
  if(inquiryToggleBtn && inquiryForm){
    inquiryToggleBtn.addEventListener('click', () => {
      inquiryForm.classList.toggle('open');
    });
  }

  const inquirySubmitBtn = el.querySelector('.inquiry-submit-btn');
  if(inquirySubmitBtn){
    inquirySubmitBtn.addEventListener('click', async () => {
      const p = group[index];
      const textarea = el.querySelector('.inquiry-input');
      const msgEl = el.querySelector('.inquiry-msg');
      const content = textarea.value.trim();
      if(!content){
        msgEl.textContent = '문의 내용을 입력해주세요.';
        return;
      }
      inquirySubmitBtn.disabled = true;
      inquirySubmitBtn.textContent = '보내는 중...';
      msgEl.textContent = '';
      try{
        const { error } = await supabaseClient
          .from('inquiries')
          .insert({
            report_id: p.id,
            content: content,
            device_id: getDeviceId(),
            status: 'new'
          });
        if(error) throw error;
        msgEl.textContent = '문의가 접수되었어요. 확인 후 반영할게요!';
        textarea.value = '';
      }catch(err){
        msgEl.textContent = '전송에 실패했어요: ' + err.message;
      }finally{
        inquirySubmitBtn.disabled = false;
        inquirySubmitBtn.textContent = '문의 보내기';
      }
    });
  }
}

function renderPlants(list){
  closeBottomSheet();
  markerClusterGroup.clearLayers();
  markers = [];

  const withLocation = list.filter(p => p.lat != null && p.lng != null);
  const groups = groupByLocation(withLocation);

  groups.forEach(group => {
    const first = group[0];
    const marker = L.marker([first.lat, first.lng]);
    marker._group = group;
    marker._groupIndex = 0;
    marker._photoIndex = 0;
    marker.on('click', () => openBottomSheet(marker));
    markerClusterGroup.addLayer(marker);
    markers.push(marker);
  });

  document.getElementById('visibleCount').textContent = list.length;
}

/* ---------- 반응(도움이 되었어요) 토글 ---------- */
async function toggleReaction(reportId, marker){
  const deviceId = getDeviceId();
  const alreadyReacted = MY_REACTIONS.has(reportId);

  try{
    if(alreadyReacted){
      const { error } = await supabaseClient
        .from('reactions')
        .delete()
        .eq('report_id', reportId)
        .eq('device_id', deviceId);
      if(error) throw error;
      MY_REACTIONS.delete(reportId);
      REACTION_COUNTS[reportId] = Math.max(0, (REACTION_COUNTS[reportId] || 1) - 1);
    }else{
      const { error } = await supabaseClient
        .from('reactions')
        .insert({ report_id: reportId, device_id: deviceId });
      if(error) throw error;
      MY_REACTIONS.add(reportId);
      REACTION_COUNTS[reportId] = (REACTION_COUNTS[reportId] || 0) + 1;
    }

    const plant = ALL_PLANTS.find(p => p.id === reportId);
    if(plant && currentSheetMarker === marker){
      renderSheetContent(marker);
    }
  }catch(err){
    console.error(err);
    alert('반응을 저장하지 못했어요.\n오류 내용: ' + (err.message || '알 수 없는 오류'));
  }
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[s]));
}

/* ---------- 검색 ---------- */
document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  const filtered = ALL_PLANTS.filter(p => (p.plant_name || '').toLowerCase().includes(q));
  renderPlants(q ? filtered : applyActiveCategory(ALL_PLANTS));

  // 검색어로 결과가 좁혀지면 해당 핀 위치로 지도만 이동시킨다 (정보창은 자동으로 열지 않음).
  if(q && filtered.length > 0){
    const target = filtered[0];
    if(target.lat != null && target.lng != null){
      map.flyTo([target.lat, target.lng], Math.max(map.getZoom(), 15));
    }
  }
});

/* ---------- 카테고리 필터 ---------- */
document.getElementById('filterRow').addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if(!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeCat = chip.dataset.cat;
  renderPlants(applyActiveCategory(ALL_PLANTS));
});
function applyActiveCategory(list){
  if(activeCat === 'all') return list;
  return list.filter(p => (p.category || 'etc') === activeCat);
}

/* ---------- GPS 위치 요청 (모바일 최적화) ---------- */
function requestGeoLocation(showMessage){
  const note = document.getElementById('geoNote');
  const onError = (err) => {
    const detail = err && err.code === 1 ? '사용자가 권한을 거부했습니다' : err && err.code === 2 ? '위치 정보를 찾을 수 없습니다' : err && err.code === 3 ? '위치 요청이 시간 초과됐습니다' : '위치 요청에 실패했습니다';
    if(showMessage){
      note.textContent = `${detail}. 모바일에서는 브라우저 설정에서 위치 권한을 허용한 뒤 다시 눌러주세요.`;
      note.style.display = 'block';
    }
  };

  if(!navigator.geolocation){
    if(showMessage){
      note.textContent = '이 브라우저는 위치 기능을 지원하지 않습니다.';
      note.style.display = 'block';
    }
    return;
  }
  if(location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1'){
    if(showMessage){
      note.textContent = '모바일에서는 HTTPS 주소로 열었을 때 위치 권한이 더 안정적으로 작동합니다.';
      note.style.display = 'block';
    }
    return;
  }
  if(showMessage){
    note.textContent = '위치 권한을 확인하는 중입니다. 브라우저가 권한 요청을 표시하면 허용해 주세요.';
    note.style.display = 'block';
  }
  navigator.geolocation.getCurrentPosition(pos => {
    if(showMessage){ note.textContent = '현재 위치로 지도를 이동했습니다.'; }
    map.panTo([pos.coords.latitude, pos.coords.longitude]);
  }, onError, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
}

/* ---------- GPS 버튼 ---------- */
document.getElementById('gpsBtn').addEventListener('click', () => requestGeoLocation(true));

/* ---------- 제보하기 버튼: report.html로 이동 ---------- */
document.getElementById('reportBtn').addEventListener('click', () => {
  location.href = 'report.html';
});

/* ---------- 지도 초기화 ---------- */
document.addEventListener('DOMContentLoaded', initMap);
</script>
