<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<title>관리자 - 제보 승인</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  :root{
    --forest:#1F3D2B;
    --moss:#4A7C59;
    --paper:#F2ECDE;
    --coral:#C97B63;
    --ink:#2B2620;
    --gold:#D4A94A;
    --line:#D8CDB4;
    --card:#FBF8F0;
    --danger:#B4543E;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    background:var(--paper);
    min-height:100vh;
  }
  header{
    display:flex; align-items:center; gap:12px;
    padding:16px 24px;
    background:var(--forest);
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  header a{ color:var(--paper); text-decoration:none; font-size:20px; }
  header h1{
    font-family:'Fraunces', serif; font-weight:600; font-size:18px; color:var(--paper); flex:1;
  }
  .logout-btn{
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
    color:var(--paper); font-size:12px; padding:6px 12px; border-radius:999px; cursor:pointer;
  }

  main{ max-width:720px; margin:0 auto; padding:32px 20px 60px; }

  /* ---------- 로그인 화면 ---------- */
  #loginScreen{
    max-width:360px; margin:80px auto; padding:0 20px; text-align:center;
  }
  #loginScreen .icon{ font-size:36px; margin-bottom:14px; }
  #loginScreen h2{ font-family:'Fraunces', serif; font-size:20px; color:var(--forest); margin-bottom:18px; }
  #loginScreen input{
    width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:10px;
    background:var(--card); font-size:16px; color:var(--ink); outline:none; margin-bottom:10px;
  }
  #loginScreen input:focus{ border-color:var(--moss); }
  #loginScreen button{
    width:100%; padding:13px; border:none; border-radius:12px;
    background:var(--forest); color:var(--paper); font-weight:600; font-size:14px; cursor:pointer;
  }
  #loginError{ font-size:12px; color:var(--danger); margin-top:8px; display:none; }

  /* ---------- 관리자 패널 ---------- */
  #adminPanel{ display:none; }
  .summary{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:20px;
  }
  .summary h2{ font-family:'Fraunces', serif; font-size:20px; color:var(--forest); }
  .summary .count-badge{
    background:var(--coral); color:#fff; font-weight:700; font-size:13px;
    padding:5px 12px; border-radius:999px;
  }

  .empty-state{
    text-align:center; padding:60px 20px; color:#8A8268;
  }
  .empty-state .icon{ font-size:34px; margin-bottom:10px; }

  .report-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:16px; margin-bottom:16px;
    box-shadow:0 4px 14px rgba(31,61,43,.06);
  }
  .report-card .top-row{
    display:flex; gap:12px;
  }
  .report-card img{
    width:88px; height:88px; border-radius:10px; object-fit:cover; flex-shrink:0;
    background:#E4DEC9;
  }
  .photo-thumb-row{
    display:flex; gap:6px; overflow-x:auto; flex-shrink:0;
  }
  .photo-thumb-row img{
    width:88px; height:88px; border-radius:10px; object-fit:cover; flex-shrink:0;
    background:#E4DEC9; cursor:zoom-in;
  }

  /* ---------- 사진 편집기 (추가/삭제) ---------- */
  .photo-editor{ margin-top:12px; }
  .photo-editor-grid{
    display:flex; gap:8px; overflow-x:auto; margin-bottom:8px; padding-bottom:2px;
  }
  .photo-editor-item{
    position:relative; width:76px; height:76px; flex-shrink:0;
    border-radius:10px; overflow:hidden; background:#E4DEC9;
  }
  .photo-editor-item img{
    width:100%; height:100%; object-fit:cover; cursor:zoom-in; display:block;
  }
  .photo-editor-item .remove-photo-x{
    position:absolute; top:3px; right:3px; width:20px; height:20px; border-radius:50%;
    background:rgba(43,38,32,.7); color:#fff; font-size:12px; border:none;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .photo-add-label{
    display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600;
    padding:8px 14px; border:1.5px dashed var(--moss); border-radius:10px;
    color:var(--forest); cursor:pointer; background:var(--paper);
  }
  .photo-add-label input[type=file]{ display:none; }
  .photo-editor-hint{ font-size:11px; color:#9A9078; margin-top:4px; }

  /* ---------- 사진 크게 보기(라이트박스) ---------- */
  .photo-lightbox{
    position:fixed; inset:0; z-index:9999;
    background:rgba(20,18,14,.9);
    display:none; align-items:center; justify-content:center;
    padding:24px;
  }
  .photo-lightbox.active{ display:flex; }
  .photo-lightbox img{
    max-width:92vw; max-height:88vh; border-radius:10px;
    box-shadow:0 10px 40px rgba(0,0,0,.5);
  }
  .lightbox-close{
    position:absolute; top:18px; right:22px;
    width:36px; height:36px; border-radius:50%;
    background:rgba(255,255,255,.15); color:#fff; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; border:1px solid rgba(255,255,255,.3);
  }
  .report-card .meta{ flex:1; min-width:0; }
  .report-card .nickname{ font-weight:600; font-size:14px; color:var(--forest); }
  .report-card .time{ font-size:11px; color:#9A9078; margin-top:2px; }
  .report-card .desc{ font-size:13px; color:var(--ink); margin-top:6px; line-height:1.4; }
  .report-card .coords{ font-size:11px; color:#7A7360; margin-top:6px; }
  .report-card .coords a{ color:var(--moss); }

  .approve-form{
    margin-top:14px; padding-top:14px; border-top:1px dashed var(--line);
    display:flex; flex-direction:column; gap:10px;
  }
  .approve-form .name-cat-row{
    display:flex; gap:8px; flex-wrap:wrap;
  }
  .approve-form input[type=text]{
    flex:1; min-width:120px; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    background:#fff; font-size:14px; outline:none;
  }
  .approve-form input[type=text]:focus{ border-color:var(--moss); }
  .approve-form select{
    padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    background:#fff; font-size:14px; outline:none;
  }
  .field-label{
    font-size:11px; font-weight:600; color:#7A7360; margin-bottom:3px; display:block;
  }
  .approve-form textarea{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    background:#fff; font-size:13px; outline:none; font-family:'Work Sans', sans-serif;
    min-height:52px; resize:vertical;
  }
  .approve-form textarea:focus{ border-color:var(--moss); }
  .memo-toggle-row{
    display:flex; align-items:center; gap:8px; font-size:12px; color:var(--forest); font-weight:500;
  }
  .memo-toggle-row input[type=checkbox]{ width:16px; height:16px; accent-color:var(--moss); cursor:pointer; }

  .action-row{
    margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;
  }
  .btn-approve, .btn-reject{
    flex:1; padding:10px; border:none; border-radius:10px;
    font-weight:600; font-size:13px; cursor:pointer;
  }
  .btn-approve{ background:var(--moss); color:#fff; }
  .btn-approve:disabled{ opacity:.5; cursor:not-allowed; }
  .btn-reject{ background:transparent; border:1px solid var(--danger); color:var(--danger); }

  .card-error{ font-size:12px; color:var(--danger); margin-top:8px; display:none; }

  /* ---------- 탭 (대기중 / 승인됨) ---------- */
  .tabs{ display:flex; gap:8px; margin-bottom:20px; }
  .tab-btn{
    flex:1; padding:11px; border-radius:12px; border:1px solid var(--line);
    background:var(--card); font-weight:600; font-size:13px; cursor:pointer; color:var(--ink);
  }
  .tab-btn.active{ background:var(--forest); color:var(--paper); border-color:var(--forest); }

  /* ---------- 승인된 항목 수정 카드 ---------- */
  .edit-fields{
    margin-top:14px; padding-top:14px; border-top:1px dashed var(--line);
    display:flex; flex-direction:column; gap:8px;
  }
  .edit-fields input[type=text], .edit-fields textarea, .edit-fields select{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    background:#fff; font-size:14px; outline:none; font-family:'Work Sans', sans-serif;
  }
  .edit-fields input[type=text]:focus, .edit-fields textarea:focus{ border-color:var(--moss); }
  .edit-fields textarea{ min-height:56px; resize:vertical; }
  .loc-fix-label{
    font-size:12px; color:var(--forest); font-weight:600; margin-top:4px;
  }
  .mini-edit-map{
    width:100%; height:160px; border-radius:10px; border:1px solid var(--line);
    background:#E4DEC9;
  }
  .loc-fix-hint{ font-size:11px; color:#7A7360; }
  .btn-toggle-map{
    align-self:flex-start;
    background:var(--paper); border:1px solid var(--moss); border-radius:10px;
    padding:8px 14px; font-size:12px; font-weight:600; color:var(--forest); cursor:pointer;
  }
  .btn-gps-mini{
    align-self:flex-start;
    display:flex; align-items:center; gap:6px;
    background:var(--paper); border:1px solid var(--line); border-radius:10px;
    padding:8px 14px; font-size:12px; font-weight:500; color:var(--forest); cursor:pointer;
  }
  .btn-gps-mini:disabled{ opacity:.5; cursor:not-allowed; }
  .btn-save{
    padding:10px; border:none; border-radius:10px;
    background:var(--forest); color:var(--paper); font-weight:600; font-size:13px; cursor:pointer;
  }
  .btn-save:disabled{ opacity:.5; cursor:not-allowed; }
  .btn-delete{
    padding:10px 14px; border:1px solid var(--danger); border-radius:10px;
    background:transparent; color:var(--danger); font-weight:600; font-size:13px; cursor:pointer;
  }
  .btn-delete:disabled{ opacity:.5; cursor:not-allowed; }
  .save-ok-msg{ font-size:12px; color:var(--moss); font-weight:600; display:none; align-self:center; }

  @media (max-width:480px){
    main{padding:20px 14px 40px;}
    .report-card .top-row{flex-direction:column;}
    .report-card > .top-row > img{width:100%; height:160px;}
    .photo-thumb-row img{width:72px; height:72px;}
  }
</style>
</head>
<body>

<div class="photo-lightbox" id="photoLightbox">
  <div class="lightbox-close" id="lightboxClose">✕</div>
  <img id="lightboxImg" src="" alt="사진 크게 보기" />
</div>

<header>
  <a href="index.html" aria-label="뒤로가기">&larr;</a>
  <h1>🔐 관리자 - 제보 승인</h1>
  <button class="logout-btn" id="logoutBtn" style="display:none;">로그아웃</button>
</header>

<!-- ---------- 로그인 화면 ---------- -->
<div id="loginScreen">
  <div class="icon">🔐</div>
  <h2>관리자 비밀번호를 입력해주세요</h2>
  <input type="password" id="passwordInput" placeholder="비밀번호" />
  <button id="loginBtn">로그인</button>
  <div id="loginError">비밀번호가 올바르지 않아요.</div>
</div>

<!-- ---------- 관리자 패널 ---------- -->
<main id="adminPanel">
  <div class="tabs">
    <button class="tab-btn active" id="tabPendingBtn" data-tab="pending">🕓 대기중 <span id="pendingCountBadge">0</span></button>
    <button class="tab-btn" id="tabApprovedBtn" data-tab="approved">✅ 승인됨 <span id="approvedCountBadge">0</span></button>
  </div>

  <div id="pendingTab">
    <div class="summary">
      <h2>대기중인 제보</h2>
    </div>
    <div id="listArea"></div>
  </div>

  <div id="approvedTab" style="display:none;">
    <div class="summary">
      <h2>승인된 제보 (수정 가능)</h2>
    </div>
    <div id="approvedListArea"></div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   설정값
   ⚠️ ADMIN_PASSWORD는 배포 전에 팀에서 정한 실제 비밀번호로 바꿔주세요.
   이 값은 페이지 소스에 그대로 보이니, 아주 민감한 정보로는 쓰지 마세요.
============================================================= */
const CONFIG = {
  SUPABASE_URL: "https://tdyhuausauyqnclmzjin.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_ly243x1R040NH714t21Gew_kvcBc1SH",
  ADMIN_PASSWORD: "sibalnamhae4522@"
};

const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
const CATEGORY_OPTIONS = [
  { value:'tree', label:'🌳 나무' },
  { value:'flower', label:'🌸 꽃' },
  { value:'grass', label:'🌱 풀' },
  { value:'etc', label:'🍀 기타' }
];

/* ---------- 로그인 처리 (세션 동안만 유지, 탭 닫으면 풀림) ---------- */
function isLoggedIn(){ return sessionStorage.getItem('admin_ok') === '1'; }

function showLoggedInUI(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  document.getElementById('logoutBtn').style.display = 'inline-block';
  loadPendingReports();
  loadApprovedReports();
}

/* ---------- 탭 전환 (대기중 / 승인됨) ---------- */
document.getElementById('tabPendingBtn').addEventListener('click', () => switchTab('pending'));
document.getElementById('tabApprovedBtn').addEventListener('click', () => switchTab('approved'));

function switchTab(tab){
  document.getElementById('tabPendingBtn').classList.toggle('active', tab === 'pending');
  document.getElementById('tabApprovedBtn').classList.toggle('active', tab === 'approved');
  document.getElementById('pendingTab').style.display = tab === 'pending' ? 'block' : 'none';
  document.getElementById('approvedTab').style.display = tab === 'approved' ? 'block' : 'none';
}

document.getElementById('loginBtn').addEventListener('click', () => {
  const input = document.getElementById('passwordInput').value;
  if(input === CONFIG.ADMIN_PASSWORD){
    sessionStorage.setItem('admin_ok', '1');
    showLoggedInUI();
  }else{
    document.getElementById('loginError').style.display = 'block';
  }
});
document.getElementById('passwordInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){ document.getElementById('loginBtn').click(); }
});
document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('admin_ok');
  location.reload();
});

if(isLoggedIn()){ showLoggedInUI(); }

function getPhotoUrls(report){
  if(Array.isArray(report.photo_urls) && report.photo_urls.length > 0) return report.photo_urls;
  return report.photo_url ? [report.photo_url] : [];
}

const MAX_PHOTOS = 5;

/* ---------- 사진 편집기: 카드마다 기존 사진(existingUrls) + 새로 추가한 파일(newFiles) 상태를 관리 ----------
   card 안의 .photo-editor-grid / .photo-add-input을 찾아서 미리보기 렌더링과 추가/삭제를 담당하고,
   { getFinalUrls() } 를 반환해서 승인/저장 시 최종 사진 배열을 얻을 수 있게 해요. */
function setupPhotoEditor(card, report){
  const state = {
    existingUrls: getPhotoUrls(report).slice(),
    newFiles: []
  };
  const grid = card.querySelector('.photo-editor-grid');
  const addInput = card.querySelector('.photo-add-input');

  function render(){
    grid.innerHTML = '';

    state.existingUrls.forEach((url, i) => {
      const item = document.createElement('div');
      item.className = 'photo-editor-item';
      const img = document.createElement('img');
      img.src = url;
      img.addEventListener('click', () => openLightbox(url));
      item.appendChild(img);

      const rm = document.createElement('button');
      rm.type = 'button';
      rm.className = 'remove-photo-x';
      rm.textContent = '✕';
      rm.addEventListener('click', () => {
        state.existingUrls.splice(i, 1);
        render();
      });
      item.appendChild(rm);
      grid.appendChild(item);
    });

    state.newFiles.forEach((file, i) => {
      const item = document.createElement('div');
      item.className = 'photo-editor-item';
      const img = document.createElement('img');
      const reader = new FileReader();
      reader.onload = (ev) => { img.src = ev.target.result; };
      reader.readAsDataURL(file);
      img.addEventListener('click', () => openLightbox(img.src));
      item.appendChild(img);

      const rm = document.createElement('button');
      rm.type = 'button';
      rm.className = 'remove-photo-x';
      rm.textContent = '✕';
      rm.addEventListener('click', () => {
        state.newFiles.splice(i, 1);
        render();
      });
      item.appendChild(rm);
      grid.appendChild(item);
    });
  }
  render();

  if(addInput){
    addInput.addEventListener('change', (e) => {
      const picked = Array.from(e.target.files || []);
      const room = MAX_PHOTOS - (state.existingUrls.length + state.newFiles.length);
      if(room > 0){ state.newFiles = state.newFiles.concat(picked.slice(0, room)); }
      render();
      e.target.value = '';
    });
  }

  return {
    // 새로 추가된 파일들을 업로드하고, 남아있는 기존 사진 + 새 업로드 사진을 합친 최종 URL 배열을 반환
    async getFinalUrls(reportId){
      const uploaded = [];
      for(let i = 0; i < state.newFiles.length; i++){
        const file = state.newFiles[i];
        const ext = file.name.split('.').pop();
        const fileName = `admin_${reportId}_${Date.now()}_${i}.${ext}`;
        const { error: upErr } = await supabaseClient.storage.from('plant-photos').upload(fileName, file);
        if(upErr) throw upErr;
        const { data: urlData } = supabaseClient.storage.from('plant-photos').getPublicUrl(fileName);
        uploaded.push(urlData.publicUrl);
      }
      return state.existingUrls.concat(uploaded);
    }
  };
}

/* ---------- 사진 크게 보기(라이트박스) ---------- */
function openLightbox(url){
  if(!url) return;
  document.getElementById('lightboxImg').src = url;
  document.getElementById('photoLightbox').classList.add('active');
}
function closeLightbox(){
  document.getElementById('photoLightbox').classList.remove('active');
  document.getElementById('lightboxImg').src = '';
}

function buildPhotoThumbsHtml(report){
  const urls = getPhotoUrls(report);
  if(urls.length === 0){
    return `<img src="" alt="제보 사진" style="opacity:.3" />`;
  }
  return `<div class="photo-thumb-row">${urls.map(u => `
    <a href="${u}" target="_blank" rel="noopener"><img src="${u}" alt="제보 사진" onerror="this.style.opacity=0.3" /></a>
  `).join('')}</div>`;
}

/* ---------- 대기중 제보 불러오기 ---------- */
async function loadPendingReports(){
  const listArea = document.getElementById('listArea');
  listArea.innerHTML = '<div class="empty-state">불러오는 중...</div>';

  const { data, error } = await supabaseClient
    .from('reports')
    .select('*')
    .eq('status', 'pending')
    .order('created_at', { ascending: true });

  if(error){
    listArea.innerHTML = `<div class="empty-state">불러오지 못했어요.<br>오류: ${escapeHtml(error.message)}</div>`;
    document.getElementById('pendingCountBadge').textContent = '0';
    return;
  }

  document.getElementById('pendingCountBadge').textContent = `${data.length}`;

  if(data.length === 0){
    listArea.innerHTML = '<div class="empty-state"><div class="icon">🌿</div>대기중인 제보가 없어요.</div>';
    return;
  }

  listArea.innerHTML = '';
  data.forEach(report => listArea.appendChild(buildReportCard(report)));
}

function buildReportCard(report){
  const card = document.createElement('div');
  card.className = 'report-card';

  const timeStr = report.created_at
    ? new Date(report.created_at).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
    : '';

  const mapLink = (report.lat != null && report.lng != null)
    ? `<a href="https://www.google.com/maps?q=${report.lat},${report.lng}" target="_blank" rel="noopener">지도에서 위치 보기 ↗</a>`
    : '위치 정보 없음';

  card.innerHTML = `
    <div class="top-row">
      <div class="meta">
        <div class="nickname">🌿 ${escapeHtml(report.nickname || '익명')}</div>
        <div class="time">${timeStr}</div>
        <div class="coords">📍 ${mapLink}</div>
      </div>
    </div>
    <div class="photo-editor">
      <div class="photo-editor-grid"></div>
      <label class="photo-add-label">
        📷 사진 추가
        <input type="file" class="photo-add-input" accept="image/*" multiple />
      </label>
      <div class="photo-editor-hint">최대 5장까지 추가할 수 있어요</div>
    </div>
    <div class="approve-form">
      <div class="name-cat-row">
        <input type="text" class="plant-name-input" placeholder="식물 이름 (예: 벚나무)" />
        <select class="category-select">
          ${CATEGORY_OPTIONS.map(c => `<option value="${c.value}">${c.label}</option>`).join('')}
        </select>
      </div>
      <div>
        <span class="field-label">💬 메모 (사용자가 남긴 내용, 수정 가능)</span>
        <textarea class="memo-input">${escapeHtml(report.description || '')}</textarea>
      </div>
      <div>
        <span class="field-label">📝 설명 (지도 핀에 표시될 내용)</span>
        <textarea class="admin-desc-input" placeholder="지도에 보여질 설명을 입력해주세요"></textarea>
      </div>
      <label class="memo-toggle-row">
        <input type="checkbox" class="show-memo-checkbox" />
        지도 핀에 메모도 함께 보여주기
      </label>
    </div>
    <div class="action-row">
      <button class="btn-approve">✅ 승인</button>
      <button class="btn-reject">🚫 반려</button>
    </div>
    <div class="card-error"></div>
  `;

  const approveBtn = card.querySelector('.btn-approve');
  const rejectBtn = card.querySelector('.btn-reject');
  const errorEl = card.querySelector('.card-error');
  const photoEditor = setupPhotoEditor(card, report);

  approveBtn.addEventListener('click', async () => {
    const plantName = card.querySelector('.plant-name-input').value.trim();
    const category = card.querySelector('.category-select').value;
    const memo = card.querySelector('.memo-input').value.trim();
    const adminDesc = card.querySelector('.admin-desc-input').value.trim();
    const showMemo = card.querySelector('.show-memo-checkbox').checked;
    if(!plantName){
      errorEl.textContent = '식물 이름을 입력해주세요.';
      errorEl.style.display = 'block';
      return;
    }
    errorEl.style.display = 'none';
    approveBtn.disabled = true;
    rejectBtn.disabled = true;
    approveBtn.textContent = '처리 중...';

    let finalPhotoUrls;
    try{
      finalPhotoUrls = await photoEditor.getFinalUrls(report.id);
    }catch(photoErr){
      errorEl.textContent = '사진 업로드에 실패했어요: ' + photoErr.message;
      errorEl.style.display = 'block';
      approveBtn.disabled = false;
      rejectBtn.disabled = false;
      approveBtn.textContent = '✅ 승인';
      return;
    }
    if(finalPhotoUrls.length === 0){
      errorEl.textContent = '사진을 1장 이상 유지해주세요.';
      errorEl.style.display = 'block';
      approveBtn.disabled = false;
      rejectBtn.disabled = false;
      approveBtn.textContent = '✅ 승인';
      return;
    }

    const { error } = await supabaseClient
      .from('reports')
      .update({
        status: 'approved',
        plant_name: plantName,
        category: category,
        description: memo,
        admin_desc: adminDesc,
        show_memo: showMemo,
        photo_url: finalPhotoUrls[0],
        photo_urls: finalPhotoUrls
      })
      .eq('id', report.id);

    if(error){
      errorEl.textContent = '승인 처리에 실패했어요: ' + error.message;
      errorEl.style.display = 'block';
      approveBtn.disabled = false;
      rejectBtn.disabled = false;
      approveBtn.textContent = '✅ 승인';
      return;
    }
    card.remove();
    updateCountAfterRemoval();
    loadApprovedReports();
  });

  rejectBtn.addEventListener('click', async () => {
    if(!confirm('이 제보를 반려하시겠어요? 목록에서 사라져요.')) return;
    approveBtn.disabled = true;
    rejectBtn.disabled = true;
    rejectBtn.textContent = '처리 중...';

    const { error } = await supabaseClient
      .from('reports')
      .update({ status: 'rejected' })
      .eq('id', report.id);

    if(error){
      errorEl.textContent = '반려 처리에 실패했어요: ' + error.message;
      errorEl.style.display = 'block';
      approveBtn.disabled = false;
      rejectBtn.disabled = false;
      rejectBtn.textContent = '🚫 반려';
      return;
    }
    card.remove();
    updateCountAfterRemoval();
  });

  return card;
}

function updateCountAfterRemoval(){
  const listArea = document.getElementById('listArea');
  const remaining = listArea.querySelectorAll('.report-card').length;
  document.getElementById('pendingCountBadge').textContent = `${remaining}`;
  if(remaining === 0){
    listArea.innerHTML = '<div class="empty-state"><div class="icon">🌿</div>대기중인 제보가 없어요.</div>';
  }
}

/* ================================================================
   승인된 제보 목록 + 수정(이름/설명/카테고리/위치) 기능
================================================================= */
async function loadApprovedReports(){
  const listArea = document.getElementById('approvedListArea');
  listArea.innerHTML = '<div class="empty-state">불러오는 중...</div>';

  const { data, error } = await supabaseClient
    .from('reports')
    .select('*')
    .eq('status', 'approved')
    .order('created_at', { ascending: false });

  if(error){
    listArea.innerHTML = `<div class="empty-state">불러오지 못했어요.<br>오류: ${escapeHtml(error.message)}</div>`;
    document.getElementById('approvedCountBadge').textContent = '0';
    return;
  }

  document.getElementById('approvedCountBadge').textContent = `${data.length}`;

  if(data.length === 0){
    listArea.innerHTML = '<div class="empty-state"><div class="icon">🌿</div>승인된 제보가 아직 없어요.</div>';
    return;
  }

  listArea.innerHTML = '';
  data.forEach(report => listArea.appendChild(buildApprovedCard(report)));
}

function buildApprovedCard(report){
  const card = document.createElement('div');
  card.className = 'report-card';

  const dateStr = report.created_at
    ? new Date(report.created_at).toLocaleString('ko-KR', { year:'numeric', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
    : '알 수 없음';

  card.innerHTML = `
    <div class="top-row">
      <div class="meta">
        <div class="nickname">🌿 ${escapeHtml(report.nickname || '익명')}</div>
        <div class="time">📅 제보일(등록일): ${dateStr}</div>
      </div>
    </div>
    <div class="photo-editor">
      <div class="photo-editor-grid"></div>
      <label class="photo-add-label">
        📷 사진 추가
        <input type="file" class="photo-add-input" accept="image/*" multiple />
      </label>
      <div class="photo-editor-hint">최대 5장까지 추가할 수 있어요</div>
    </div>
    <div class="edit-fields">
      <input type="text" class="edit-name-input" placeholder="식물 이름" value="${escapeHtml(report.plant_name || '')}" />
      <div>
        <span class="field-label">💬 메모 (사용자가 남긴 내용)</span>
        <textarea class="edit-memo-input">${escapeHtml(report.description || '')}</textarea>
      </div>
      <div>
        <span class="field-label">📝 설명 (지도 핀에 표시될 내용)</span>
        <textarea class="edit-desc-input" placeholder="지도에 보여질 설명을 입력해주세요">${escapeHtml(report.admin_desc || '')}</textarea>
      </div>
      <label class="memo-toggle-row">
        <input type="checkbox" class="edit-show-memo-checkbox" ${report.show_memo ? 'checked' : ''} />
        지도 핀에 메모도 함께 보여주기
      </label>
      <select class="edit-category-select">
        ${CATEGORY_OPTIONS.map(c => `<option value="${c.value}" ${c.value === report.category ? 'selected' : ''}>${c.label}</option>`).join('')}
      </select>
      <div class="loc-fix-label">📍 위치가 잘못됐다면 아래에서 수정할 수 있어요</div>
      <div class="loc-fix-hint" id="loc-hint-${report.id}"></div>
      <button type="button" class="btn-toggle-map" id="toggle-map-${report.id}">🗺️ 지도에서 위치 수정하기</button>
      <div class="mini-edit-map" id="edit-map-${report.id}" style="display:none;"></div>
      <button type="button" class="btn-gps-mini" id="gps-mini-${report.id}" style="display:none;">📍 현재 위치 사용</button>
    </div>
    <div class="action-row">
      <button class="btn-save">💾 저장</button>
      <button class="btn-delete">🗑️ 삭제</button>
      <span class="save-ok-msg">저장됐어요 ✅</span>
    </div>
    <div class="card-error"></div>
  `;

  // 위치 수정용 미니맵 — 성능을 위해 "지도에서 위치 수정하기" 버튼을 눌렀을 때만 생성함
  let currentLat = report.lat;
  let currentLng = report.lng;
  let miniMap = null;
  let miniMarker = null;

  const photoEditor = setupPhotoEditor(card, report);

  const hintEl = card.querySelector(`#loc-hint-${report.id}`);
  const mapEl = card.querySelector(`#edit-map-${report.id}`);
  const toggleBtn = card.querySelector(`#toggle-map-${report.id}`);
  const gpsBtn = card.querySelector(`#gps-mini-${report.id}`);

  function updateHint(){
    hintEl.textContent = (currentLat != null && currentLng != null)
      ? `현재 위치: 위도 ${currentLat.toFixed(5)}, 경도 ${currentLng.toFixed(5)}`
      : '위치 정보 없음';
  }
  updateHint();

  toggleBtn.addEventListener('click', () => {
    const willShow = mapEl.style.display === 'none';

    if(willShow){
      mapEl.style.display = 'block';
      gpsBtn.style.display = 'flex';
      toggleBtn.textContent = '🗺️ 지도 숨기기';

      // 지도는 처음 열 때 딱 한 번만 생성 (카드마다 미리 만들지 않아서 훨씬 가벼워요)
      if(!miniMap && currentLat != null && currentLng != null){
        miniMap = L.map(mapEl).setView([currentLat, currentLng], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '&copy; OpenStreetMap contributors'
        }).addTo(miniMap);

        miniMarker = L.marker([currentLat, currentLng], { draggable: true }).addTo(miniMap);

        miniMap.on('click', (e) => {
          currentLat = e.latlng.lat;
          currentLng = e.latlng.lng;
          miniMarker.setLatLng(e.latlng);
          updateHint();
        });
        miniMarker.on('dragend', () => {
          const pos = miniMarker.getLatLng();
          currentLat = pos.lat;
          currentLng = pos.lng;
          updateHint();
        });
      }
      setTimeout(() => { if(miniMap) miniMap.invalidateSize(); }, 50);
    }else{
      mapEl.style.display = 'none';
      gpsBtn.style.display = 'none';
      toggleBtn.textContent = '🗺️ 지도에서 위치 수정하기';
    }
  });

  gpsBtn.addEventListener('click', () => {
    if(!navigator.geolocation){
      hintEl.textContent = '이 브라우저는 위치 기능을 지원하지 않아요.';
      return;
    }
    gpsBtn.disabled = true;
    const originalText = gpsBtn.textContent;
    gpsBtn.textContent = '위치 확인 중...';
    navigator.geolocation.getCurrentPosition(pos => {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      if(miniMarker){ miniMarker.setLatLng([currentLat, currentLng]); }
      if(miniMap){ miniMap.panTo([currentLat, currentLng]); }
      updateHint();
      gpsBtn.disabled = false;
      gpsBtn.textContent = originalText;
    }, () => {
      hintEl.textContent = '현재 위치를 가져오지 못했어요. 브라우저 위치 권한을 확인해주세요.';
      gpsBtn.disabled = false;
      gpsBtn.textContent = originalText;
    }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
  });

  const saveBtn = card.querySelector('.btn-save');
  const deleteBtn = card.querySelector('.btn-delete');
  const errorEl = card.querySelector('.card-error');
  const okMsg = card.querySelector('.save-ok-msg');

  saveBtn.addEventListener('click', async () => {
    const plantName = card.querySelector('.edit-name-input').value.trim();
    const memo = card.querySelector('.edit-memo-input').value.trim();
    const adminDesc = card.querySelector('.edit-desc-input').value.trim();
    const showMemo = card.querySelector('.edit-show-memo-checkbox').checked;
    const category = card.querySelector('.edit-category-select').value;

    if(!plantName){
      errorEl.textContent = '식물 이름을 입력해주세요.';
      errorEl.style.display = 'block';
      return;
    }
    errorEl.style.display = 'none';
    okMsg.style.display = 'none';
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';

    let finalPhotoUrls;
    try{
      finalPhotoUrls = await photoEditor.getFinalUrls(report.id);
    }catch(photoErr){
      errorEl.textContent = '사진 업로드에 실패했어요: ' + photoErr.message;
      errorEl.style.display = 'block';
      saveBtn.disabled = false;
      saveBtn.textContent = '💾 저장';
      return;
    }
    if(finalPhotoUrls.length === 0){
      errorEl.textContent = '사진을 1장 이상 유지해주세요.';
      errorEl.style.display = 'block';
      saveBtn.disabled = false;
      saveBtn.textContent = '💾 저장';
      return;
    }

    // ⚠️ created_at(제보일)은 건드리지 않고, 내용/위치만 수정합니다.
    const { data, error } = await supabaseClient
      .from('reports')
      .update({
        plant_name: plantName,
        description: memo,
        admin_desc: adminDesc,
        show_memo: showMemo,
        category: category,
        lat: currentLat,
        lng: currentLng,
        photo_url: finalPhotoUrls[0],
        photo_urls: finalPhotoUrls
      })
      .eq('id', report.id)
      .select();

    saveBtn.disabled = false;
    saveBtn.textContent = '💾 저장';

    if(error){
      errorEl.textContent = '저장에 실패했어요: ' + error.message;
      errorEl.style.display = 'block';
      return;
    }
    if(!data || data.length === 0){
      errorEl.textContent = '저장이 반영되지 않았어요. Supabase의 reports 테이블에 UPDATE 정책이 없을 수 있어요.';
      errorEl.style.display = 'block';
      return;
    }

    okMsg.style.display = 'inline';
    setTimeout(() => { okMsg.style.display = 'none'; }, 2500);
  });

  deleteBtn.addEventListener('click', async () => {
    const plantLabel = card.querySelector('.edit-name-input').value.trim() || '이 제보';
    if(!confirm(`"${plantLabel}"를 정말 삭제하시겠어요?\n지도에서 완전히 사라지고, 되돌릴 수 없어요.`)) return;

    errorEl.style.display = 'none';
    saveBtn.disabled = true;
    deleteBtn.disabled = true;
    deleteBtn.textContent = '삭제 중...';

    // 이 제보에 달린 반응(reactions)도 같이 정리해서 데이터가 고아로 남지 않게 함
    const { error: reactionDeleteError } = await supabaseClient
      .from('reactions')
      .delete()
      .eq('report_id', report.id);

    if(reactionDeleteError){
      console.warn('반응 데이터 삭제 중 문제가 있었어요 (계속 진행합니다):', reactionDeleteError.message);
    }

    const { data, error } = await supabaseClient
      .from('reports')
      .delete()
      .eq('id', report.id)
      .select();

    if(error){
      errorEl.textContent = '삭제에 실패했어요: ' + error.message;
      errorEl.style.display = 'block';
      saveBtn.disabled = false;
      deleteBtn.disabled = false;
      deleteBtn.textContent = '🗑️ 삭제';
      return;
    }

    // Supabase는 RLS 정책이 없으면 에러 없이 "성공"만 반환하고 실제로는 0건 삭제되는 경우가 있어요.
    // data가 비어있으면 삭제 권한(DELETE 정책)이 없는 것으로 보고 명확히 알려줍니다.
    if(!data || data.length === 0){
      errorEl.textContent = '삭제가 반영되지 않았어요. Supabase의 reports 테이블에 DELETE 정책이 없을 수 있어요. (Authentication → Policies에서 reports 테이블에 DELETE 정책을 추가해주세요)';
      errorEl.style.display = 'block';
      saveBtn.disabled = false;
      deleteBtn.disabled = false;
      deleteBtn.textContent = '🗑️ 삭제';
      return;
    }

    if(miniMap){ miniMap.remove(); }
    card.remove();
    const remaining = document.getElementById('approvedListArea').querySelectorAll('.report-card').length;
    document.getElementById('approvedCountBadge').textContent = `${remaining}`;
    if(remaining === 0){
      document.getElementById('approvedListArea').innerHTML = '<div class="empty-state"><div class="icon">🌿</div>승인된 제보가 아직 없어요.</div>';
    }
  });

  return card;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('photoLightbox').addEventListener('click', (e) => {
  if(e.target.id === 'photoLightbox'){ closeLightbox(); } // 배경 클릭 시에만 닫기
});
</script>
