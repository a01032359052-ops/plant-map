<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<title>관리자 - 제보 승인</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  :root{
    --forest:#1F3D2B;
    --moss:#4A7C59;
    --paper:#F2ECDE;
    --coral:#C97B63;
    --ink:#2B2620;
    --gold:#D4A94A;
    --line:#D8CDB4;
    --card:#FBF8F0;
    --danger:#B4543E;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    background:var(--paper);
    min-height:100vh;
  }
  header{
    display:flex; align-items:center; gap:12px;
    padding:16px 24px;
    background:var(--forest);
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  header a{ color:var(--paper); text-decoration:none; font-size:20px; }
  header h1{
    font-family:'Fraunces', serif; font-weight:600; font-size:18px; color:var(--paper); flex:1;
  }
  .logout-btn{
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
    color:var(--paper); font-size:12px; padding:6px 12px; border-radius:999px; cursor:pointer;
  }

  main{ max-width:720px; margin:0 auto; padding:32px 20px 60px; }

  /* ---------- 로그인 화면 ---------- */
  #loginScreen{
    max-width:360px; margin:80px auto; padding:0 20px; text-align:center;
  }
  #loginScreen .icon{ font-size:36px; margin-bottom:14px; }
  #loginScreen h2{ font-family:'Fraunces', serif; font-size:20px; color:var(--forest); margin-bottom:18px; }
  #loginScreen input{
    width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:10px;
    background:var(--card); font-size:16px; color:var(--ink); outline:none; margin-bottom:10px;
  }
  #loginScreen input:focus{ border-color:var(--moss); }
  #loginScreen button{
    width:100%; padding:13px; border:none; border-radius:12px;
    background:var(--forest); color:var(--paper); font-weight:600; font-size:14px; cursor:pointer;
  }
  #loginError{ font-size:12px; color:var(--danger); margin-top:8px; display:none; }

  /* ---------- 관리자 패널 ---------- */
  #adminPanel{ display:none; }
  .summary{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:20px;
  }
  .summary h2{ font-family:'Fraunces', serif; font-size:20px; color:var(--forest); }
  .summary .count-badge{
    background:var(--coral); color:#fff; font-weight:700; font-size:13px;
    padding:5px 12px; border-radius:999px;
  }

  .empty-state{
    text-align:center; padding:60px 20px; color:#8A8268;
  }
  .empty-state .icon{ font-size:34px; margin-bottom:10px; }

  .report-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:16px; margin-bottom:16px;
    box-shadow:0 4px 14px rgba(31,61,43,.06);
  }
  .report-card .top-row{
    display:flex; gap:12px;
  }
  .report-card img{
    width:88px; height:88px; border-radius:10px; object-fit:cover; flex-shrink:0;
    background:#E4DEC9;
  }
  .report-card .meta{ flex:1; min-width:0; }
  .report-card .nickname{ font-weight:600; font-size:14px; color:var(--forest); }
  .report-card .time{ font-size:11px; color:#9A9078; margin-top:2px; }
  .report-card .desc{ font-size:13px; color:var(--ink); margin-top:6px; line-height:1.4; }
  .report-card .coords{ font-size:11px; color:#7A7360; margin-top:6px; }
  .report-card .coords a{ color:var(--moss); }

  .approve-form{
    margin-top:14px; padding-top:14px; border-top:1px dashed var(--line);
    display:flex; gap:8px; flex-wrap:wrap;
  }
  .approve-form input[type=text]{
    flex:1; min-width:120px; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    background:#fff; font-size:14px; outline:none;
  }
  .approve-form input[type=text]:focus{ border-color:var(--moss); }
  .approve-form select{
    padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    background:#fff; font-size:14px; outline:none;
  }

  .action-row{
    margin-top:10px; display:flex; gap:8px;
  }
  .btn-approve, .btn-reject{
    flex:1; padding:10px; border:none; border-radius:10px;
    font-weight:600; font-size:13px; cursor:pointer;
  }
  .btn-approve{ background:var(--moss); color:#fff; }
  .btn-approve:disabled{ opacity:.5; cursor:not-allowed; }
  .btn-reject{ background:transparent; border:1px solid var(--danger); color:var(--danger); }

  .card-error{ font-size:12px; color:var(--danger); margin-top:8px; display:none; }

  /* ---------- 탭 (대기중 / 승인됨) ---------- */
  .tabs{ display:flex; gap:8px; margin-bottom:20px; }
  .tab-btn{
    flex:1; padding:11px; border-radius:12px; border:1px solid var(--line);
    background:var(--card); font-weight:600; font-size:13px; cursor:pointer; color:var(--ink);
  }
  .tab-btn.active{ background:var(--forest); color:var(--paper); border-color:var(--forest); }

  /* ---------- 승인된 항목 수정 카드 ---------- */
  .edit-fields{
    margin-top:14px; padding-top:14px; border-top:1px dashed var(--line);
    display:flex; flex-direction:column; gap:8px;
  }
  .edit-fields input[type=text], .edit-fields textarea, .edit-fields select{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    background:#fff; font-size:14px; outline:none; font-family:'Work Sans', sans-serif;
  }
  .edit-fields input[type=text]:focus, .edit-fields textarea:focus{ border-color:var(--moss); }
  .edit-fields textarea{ min-height:56px; resize:vertical; }
  .loc-fix-label{
    font-size:12px; color:var(--forest); font-weight:600; margin-top:4px;
  }
  .mini-edit-map{
    width:100%; height:160px; border-radius:10px; border:1px solid var(--line);
    background:#E4DEC9;
  }
  .loc-fix-hint{ font-size:11px; color:#7A7360; }
  .btn-save{
    padding:10px; border:none; border-radius:10px;
    background:var(--forest); color:var(--paper); font-weight:600; font-size:13px; cursor:pointer;
  }
  .btn-save:disabled{ opacity:.5; cursor:not-allowed; }
  .save-ok-msg{ font-size:12px; color:var(--moss); font-weight:600; display:none; }

  @media (max-width:480px){
    main{padding:20px 14px 40px;}
    .report-card .top-row{flex-direction:column;}
    .report-card img{width:100%; height:160px;}
  }
</style>
</head>
<body>

<header>
  <a href="index.html" aria-label="뒤로가기">&larr;</a>
  <h1>🔐 관리자 - 제보 승인</h1>
  <button class="logout-btn" id="logoutBtn" style="display:none;">로그아웃</button>
</header>

<!-- ---------- 로그인 화면 ---------- -->
<div id="loginScreen">
  <div class="icon">🔐</div>
  <h2>관리자 비밀번호를 입력해주세요</h2>
  <input type="password" id="passwordInput" placeholder="비밀번호" />
  <button id="loginBtn">로그인</button>
  <div id="loginError">비밀번호가 올바르지 않아요.</div>
</div>

<!-- ---------- 관리자 패널 ---------- -->
<main id="adminPanel">
  <div class="tabs">
    <button class="tab-btn active" id="tabPendingBtn" data-tab="pending">🕓 대기중 <span id="pendingCountBadge">0</span></button>
    <button class="tab-btn" id="tabApprovedBtn" data-tab="approved">✅ 승인됨 <span id="approvedCountBadge">0</span></button>
  </div>

  <div id="pendingTab">
    <div class="summary">
      <h2>대기중인 제보</h2>
    </div>
    <div id="listArea"></div>
  </div>

  <div id="approvedTab" style="display:none;">
    <div class="summary">
      <h2>승인된 제보 (수정 가능)</h2>
    </div>
    <div id="approvedListArea"></div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   설정값
   ⚠️ ADMIN_PASSWORD는 배포 전에 팀에서 정한 실제 비밀번호로 바꿔주세요.
   이 값은 페이지 소스에 그대로 보이니, 아주 민감한 정보로는 쓰지 마세요.
============================================================= */
const CONFIG = {
  SUPABASE_URL: "https://tdyhuausauyqnclmzjin.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_ly243x1R040NH714t21Gew_kvcBc1SH",
  ADMIN_PASSWORD: "sibalnamhae4522@"
};

const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
const CATEGORY_OPTIONS = [
  { value:'tree', label:'🌳 나무' },
  { value:'flower', label:'🌸 꽃' },
  { value:'grass', label:'🌱 풀' },
  { value:'etc', label:'🍀 기타' }
];

/* ---------- 로그인 처리 (세션 동안만 유지, 탭 닫으면 풀림) ---------- */
function isLoggedIn(){ return sessionStorage.getItem('admin_ok') === '1'; }

function showLoggedInUI(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  document.getElementById('logoutBtn').style.display = 'inline-block';
  loadPendingReports();
  loadApprovedReports();
}

/* ---------- 탭 전환 (대기중 / 승인됨) ---------- */
document.getElementById('tabPendingBtn').addEventListener('click', () => switchTab('pending'));
document.getElementById('tabApprovedBtn').addEventListener('click', () => switchTab('approved'));

function switchTab(tab){
  document.getElementById('tabPendingBtn').classList.toggle('active', tab === 'pending');
  document.getElementById('tabApprovedBtn').classList.toggle('active', tab === 'approved');
  document.getElementById('pendingTab').style.display = tab === 'pending' ? 'block' : 'none';
  document.getElementById('approvedTab').style.display = tab === 'approved' ? 'block' : 'none';
}

document.getElementById('loginBtn').addEventListener('click', () => {
  const input = document.getElementById('passwordInput').value;
  if(input === CONFIG.ADMIN_PASSWORD){
    sessionStorage.setItem('admin_ok', '1');
    showLoggedInUI();
  }else{
    document.getElementById('loginError').style.display = 'block';
  }
});
document.getElementById('passwordInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){ document.getElementById('loginBtn').click(); }
});
document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('admin_ok');
  location.reload();
});

if(isLoggedIn()){ showLoggedInUI(); }

/* ---------- 대기중 제보 불러오기 ---------- */
async function loadPendingReports(){
  const listArea = document.getElementById('listArea');
  listArea.innerHTML = '<div class="empty-state">불러오는 중...</div>';

  const { data, error } = await supabaseClient
    .from('reports')
    .select('*')
    .eq('status', 'pending')
    .order('created_at', { ascending: true });

  if(error){
    listArea.innerHTML = `<div class="empty-state">불러오지 못했어요.<br>오류: ${escapeHtml(error.message)}</div>`;
    document.getElementById('pendingCountBadge').textContent = '0';
    return;
  }

  document.getElementById('pendingCountBadge').textContent = `${data.length}`;

  if(data.length === 0){
    listArea.innerHTML = '<div class="empty-state"><div class="icon">🌿</div>대기중인 제보가 없어요.</div>';
    return;
  }

  listArea.innerHTML = '';
  data.forEach(report => listArea.appendChild(buildReportCard(report)));
}

function buildReportCard(report){
  const card = document.createElement('div');
  card.className = 'report-card';

  const timeStr = report.created_at
    ? new Date(report.created_at).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
    : '';

  const mapLink = (report.lat != null && report.lng != null)
    ? `<a href="https://www.google.com/maps?q=${report.lat},${report.lng}" target="_blank" rel="noopener">지도에서 위치 보기 ↗</a>`
    : '위치 정보 없음';

  card.innerHTML = `
    <div class="top-row">
      <img src="${report.photo_url || ''}" alt="제보 사진" onerror="this.style.opacity=0.3" />
      <div class="meta">
        <div class="nickname">🌿 ${escapeHtml(report.nickname || '익명')}</div>
        <div class="time">${timeStr}</div>
        <div class="desc">${escapeHtml(report.description || '(메모 없음)')}</div>
        <div class="coords">📍 ${mapLink}</div>
      </div>
    </div>
    <div class="approve-form">
      <input type="text" class="plant-name-input" placeholder="식물 이름 (예: 벚나무)" />
      <select class="category-select">
        ${CATEGORY_OPTIONS.map(c => `<option value="${c.value}">${c.label}</option>`).join('')}
      </select>
    </div>
    <div class="action-row">
      <button class="btn-approve">✅ 승인</button>
      <button class="btn-reject">🚫 반려</button>
    </div>
    <div class="card-error"></div>
  `;

  const approveBtn = card.querySelector('.btn-approve');
  const rejectBtn = card.querySelector('.btn-reject');
  const errorEl = card.querySelector('.card-error');

  approveBtn.addEventListener('click', async () => {
    const plantName = card.querySelector('.plant-name-input').value.trim();
    const category = card.querySelector('.category-select').value;
    if(!plantName){
      errorEl.textContent = '식물 이름을 입력해주세요.';
      errorEl.style.display = 'block';
      return;
    }
    errorEl.style.display = 'none';
    approveBtn.disabled = true;
    rejectBtn.disabled = true;
    approveBtn.textContent = '처리 중...';

    const { error } = await supabaseClient
      .from('reports')
      .update({ status: 'approved', plant_name: plantName, category: category })
      .eq('id', report.id);

    if(error){
      errorEl.textContent = '승인 처리에 실패했어요: ' + error.message;
      errorEl.style.display = 'block';
      approveBtn.disabled = false;
      rejectBtn.disabled = false;
      approveBtn.textContent = '✅ 승인';
      return;
    }
    card.remove();
    updateCountAfterRemoval();
    loadApprovedReports();
  });

  rejectBtn.addEventListener('click', async () => {
    if(!confirm('이 제보를 반려하시겠어요? 목록에서 사라져요.')) return;
    approveBtn.disabled = true;
    rejectBtn.disabled = true;
    rejectBtn.textContent = '처리 중...';

    const { error } = await supabaseClient
      .from('reports')
      .update({ status: 'rejected' })
      .eq('id', report.id);

    if(error){
      errorEl.textContent = '반려 처리에 실패했어요: ' + error.message;
      errorEl.style.display = 'block';
      approveBtn.disabled = false;
      rejectBtn.disabled = false;
      rejectBtn.textContent = '🚫 반려';
      return;
    }
    card.remove();
    updateCountAfterRemoval();
  });

  return card;
}

function updateCountAfterRemoval(){
  const listArea = document.getElementById('listArea');
  const remaining = listArea.querySelectorAll('.report-card').length;
  document.getElementById('pendingCountBadge').textContent = `${remaining}`;
  if(remaining === 0){
    listArea.innerHTML = '<div class="empty-state"><div class="icon">🌿</div>대기중인 제보가 없어요.</div>';
  }
}

/* ================================================================
   승인된 제보 목록 + 수정(이름/설명/카테고리/위치) 기능
================================================================= */
async function loadApprovedReports(){
  const listArea = document.getElementById('approvedListArea');
  listArea.innerHTML = '<div class="empty-state">불러오는 중...</div>';

  const { data, error } = await supabaseClient
    .from('reports')
    .select('*')
    .eq('status', 'approved')
    .order('created_at', { ascending: false });

  if(error){
    listArea.innerHTML = `<div class="empty-state">불러오지 못했어요.<br>오류: ${escapeHtml(error.message)}</div>`;
    document.getElementById('approvedCountBadge').textContent = '0';
    return;
  }

  document.getElementById('approvedCountBadge').textContent = `${data.length}`;

  if(data.length === 0){
    listArea.innerHTML = '<div class="empty-state"><div class="icon">🌿</div>승인된 제보가 아직 없어요.</div>';
    return;
  }

  listArea.innerHTML = '';
  data.forEach(report => listArea.appendChild(buildApprovedCard(report)));
}

function buildApprovedCard(report){
  const card = document.createElement('div');
  card.className = 'report-card';

  const dateStr = report.created_at
    ? new Date(report.created_at).toLocaleString('ko-KR', { year:'numeric', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
    : '알 수 없음';

  card.innerHTML = `
    <div class="top-row">
      <img src="${report.photo_url || ''}" alt="제보 사진" onerror="this.style.opacity=0.3" />
      <div class="meta">
        <div class="nickname">🌿 ${escapeHtml(report.nickname || '익명')}</div>
        <div class="time">📅 제보일(등록일): ${dateStr}</div>
      </div>
    </div>
    <div class="edit-fields">
      <input type="text" class="edit-name-input" placeholder="식물 이름" value="${escapeHtml(report.plant_name || '')}" />
      <textarea class="edit-desc-input" placeholder="설명">${escapeHtml(report.description || '')}</textarea>
      <select class="edit-category-select">
        ${CATEGORY_OPTIONS.map(c => `<option value="${c.value}" ${c.value === report.category ? 'selected' : ''}>${c.label}</option>`).join('')}
      </select>
      <div class="loc-fix-label">📍 위치가 잘못됐다면, 지도를 클릭해서 정확한 위치로 옮겨주세요</div>
      <div class="mini-edit-map" id="edit-map-${report.id}"></div>
      <div class="loc-fix-hint" id="loc-hint-${report.id}"></div>
    </div>
    <div class="action-row">
      <button class="btn-save">💾 저장</button>
      <span class="save-ok-msg">저장됐어요 ✅</span>
    </div>
    <div class="card-error"></div>
  `;

  // 위치 수정용 미니맵 (기존 위치에서 시작, 클릭하면 마커 이동)
  let currentLat = report.lat;
  let currentLng = report.lng;

  setTimeout(() => {
    const mapEl = card.querySelector(`#edit-map-${report.id}`);
    if(!mapEl || currentLat == null || currentLng == null) return;

    const miniMap = L.map(mapEl).setView([currentLat, currentLng], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(miniMap);

    let miniMarker = L.marker([currentLat, currentLng], { draggable: true }).addTo(miniMap);
    const hintEl = card.querySelector(`#loc-hint-${report.id}`);

    function updateHint(){
      hintEl.textContent = `현재 위치: 위도 ${currentLat.toFixed(5)}, 경도 ${currentLng.toFixed(5)}`;
    }
    updateHint();

    miniMap.on('click', (e) => {
      currentLat = e.latlng.lat;
      currentLng = e.latlng.lng;
      miniMarker.setLatLng(e.latlng);
      updateHint();
    });
    miniMarker.on('dragend', () => {
      const pos = miniMarker.getLatLng();
      currentLat = pos.lat;
      currentLng = pos.lng;
      updateHint();
    });

    setTimeout(() => miniMap.invalidateSize(), 50);
  }, 0);

  const saveBtn = card.querySelector('.btn-save');
  const errorEl = card.querySelector('.card-error');
  const okMsg = card.querySelector('.save-ok-msg');

  saveBtn.addEventListener('click', async () => {
    const plantName = card.querySelector('.edit-name-input').value.trim();
    const description = card.querySelector('.edit-desc-input').value.trim();
    const category = card.querySelector('.edit-category-select').value;

    if(!plantName){
      errorEl.textContent = '식물 이름을 입력해주세요.';
      errorEl.style.display = 'block';
      return;
    }
    errorEl.style.display = 'none';
    okMsg.style.display = 'none';
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';

    // ⚠️ created_at(제보일)은 건드리지 않고, 내용/위치만 수정합니다.
    const { error } = await supabaseClient
      .from('reports')
      .update({
        plant_name: plantName,
        description: description,
        category: category,
        lat: currentLat,
        lng: currentLng
      })
      .eq('id', report.id);

    saveBtn.disabled = false;
    saveBtn.textContent = '💾 저장';

    if(error){
      errorEl.textContent = '저장에 실패했어요: ' + error.message;
      errorEl.style.display = 'block';
      return;
    }

    okMsg.style.display = 'inline';
    setTimeout(() => { okMsg.style.display = 'none'; }, 2500);
  });

  return card;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
</script>
</body>
</html>
